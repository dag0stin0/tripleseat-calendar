<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubKey — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<style>

/* ═══════════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════════ */
:root {
    --bg: #080808;
    --surface: #0f0f11;
    --surface-raised: #17171a;
    --surface-hover: #1e1e22;
    --surface-card: #131316;
    --text: #ececf0;
    --text-secondary: #a1a1aa;
    --text-tertiary: #63636e;
    --text-muted: #4a4a55;
    --border: #27272a;
    --border-light: #1c1c1f;
    --border-subtle: #151518;

    --blue: #3b82f6;
    --blue-soft: #60a5fa;
    --blue-dim: rgba(59, 130, 246, 0.08);
    --blue-glow: rgba(59, 130, 246, 0.15);

    --red: #ef4444;
    --red-soft: #f87171;
    --red-dim: rgba(239, 68, 68, 0.08);
    --red-glow: rgba(239, 68, 68, 0.15);

    --accent: #E85D26;
    --accent-soft: #f59e0b;
    --accent-dim: rgba(232, 93, 38, 0.08);
    --accent-glow: rgba(232, 93, 38, 0.15);
    --accent-warm: #FF6B35;

    --orange: #E85D26;
    --orange-dim: rgba(232, 93, 38, 0.08);
    --orange-glow: rgba(232, 93, 38, 0.12);

    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.10);
    --yellow: #eab308;
    --yellow-dim: rgba(234, 179, 8, 0.08);
    --purple: #a855f7;
    --purple-dim: rgba(168, 85, 247, 0.08);

    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out: cubic-bezier(0, 0, 0.2, 1);
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
}

/* Film grain overlay */
body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
}

::selection { background: rgba(232, 93, 38, 0.3); }

.sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ═══════════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════════ */
.topbar {
    border-bottom: 1px solid var(--border-light);
    padding: 0 clamp(16px, 4vw, 48px);
    height: 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8, 8, 8, 0.95);
}

.topbar-left {
    display: flex; align-items: center; gap: 14px;
}
.topbar-title {
    font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1;
    color: var(--text); margin: 0;
}
.topbar-title span {
    color: var(--accent);
}

.topbar-right {
    display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════════
   FILTER PILLS — horizontal scroll on mobile
   ═══════════════════════════════════════════ */
.filter-strip {
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 2px 0;
}
.filter-strip::-webkit-scrollbar { display: none; }

.filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 8px 14px; border-radius: 20px;
    border: 1px solid var(--border-light);
    background: transparent; color: var(--text-tertiary);
    cursor: pointer; white-space: nowrap;
    min-height: 36px;
    transition: all 0.15s var(--ease), box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
}
select.filter-btn {
    padding-right: 26px;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%2363636e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
}
.filter-btn:hover {
    color: var(--text-secondary);
    background: var(--surface-raised);
    border-color: var(--border);
}
.filter-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
.filter-btn.active {
    color: var(--text);
    border-color: var(--orange);
    background: var(--orange-dim);
}
.filter-btn.flash {
    box-shadow: 0 0 0 2px var(--orange-glow);
}

.refresh-ts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--text-muted);
    letter-spacing: 0.3px;
    margin-left: 6px;
}

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
.page {
    max-width: 1440px; margin: 0 auto;
    padding: 0 clamp(16px, 4vw, 48px);
}

/* ═══════════════════════════════════════════
   STATS BAR — cinematic numbers
   ═══════════════════════════════════════════ */
.stats-bar {
    display: flex; align-items: baseline; gap: 40px;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 28px;
    position: relative;
}

.stat {
    display: flex; align-items: baseline; gap: 8px;
    position: relative;
}
.stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px; font-weight: 700;
    letter-spacing: -2px; line-height: 1;
    color: var(--text);
    transition: opacity 0.2s, transform 0.3s var(--ease);
}
.stat-value.updating {
    opacity: 0.3;
    transform: translateY(-2px);
}
.stat-value.nyc {
    color: var(--blue-soft);
    text-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
}
.stat-value.dc {
    color: var(--red-soft);
    text-shadow: 0 0 30px rgba(239, 68, 68, 0.15);
}

.stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 1px;
    text-transform: uppercase;
}

.stats-divider {
    width: 1px; height: 24px;
    background: var(--border); flex-shrink: 0;
    opacity: 0.5;
}

/* ═══════════════════════════════════════════
   WEEK NAV
   ═══════════════════════════════════════════ */
.week-bar {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 20px;
}

.week-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: var(--radius); color: var(--text-tertiary);
    cursor: pointer; font-size: 18px; font-family: system-ui;
    transition: all 0.1s var(--ease), transform 0.08s;
}
.week-btn:hover {
    border-color: var(--border); color: var(--text-secondary);
    background: var(--surface-raised);
}
.week-btn:active { transform: scale(0.9); transition-duration: 0.04s; }
.week-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 1px; }

.week-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    padding: 0 12px;
    letter-spacing: -0.2px;
    transition: opacity 0.15s, transform 0.2s var(--ease);
}
.week-label.slide-left  { opacity: 0; transform: translateX(-8px); }
.week-label.slide-right { opacity: 0; transform: translateX(8px); }

.today-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--orange); background: var(--orange-dim);
    border: 1px solid rgba(232, 93, 38, 0.15);
    border-radius: 20px;
    padding: 8px 16px; cursor: pointer;
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-left: 8px;
    transition: all 0.15s var(--ease), box-shadow 0.2s;
}
.today-btn:hover {
    background: rgba(232, 93, 38, 0.15);
    box-shadow: 0 0 16px var(--orange-glow);
}
.today-btn:active { transform: scale(0.95); transition-duration: 0.04s; }
.today-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 1px; }

/* ═══════════════════════════════════════════
   VIEW TOGGLE
   ═══════════════════════════════════════════ */
.view-toggle {
    display: flex; gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 3px;
    margin-left: auto;
}
.view-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 6px 14px; border-radius: 16px;
    border: none; background: transparent;
    color: var(--text-tertiary); cursor: pointer;
    transition: all 0.15s var(--ease);
    min-height: 32px;
}
.view-btn:hover { color: var(--text-secondary); }
.view-btn.active {
    background: var(--orange-dim);
    color: var(--orange);
    border: 1px solid rgba(232, 93, 38, 0.15);
}
.view-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 1px; }

/* ═══════════════════════════════════════════
   MONTH GRID
   ═══════════════════════════════════════════ */
.month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin-bottom: 48px;
}
.month-grid .mg-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-tertiary);
    text-align: center;
    padding: 10px 4px;
    background: var(--surface-raised);
    border-bottom: 1px solid var(--border-light);
}
.month-grid .mg-cell {
    min-height: 100px;
    padding: 6px;
    border-right: 1px solid var(--border-light);
    border-bottom: 1px solid var(--border-light);
    background: var(--surface);
    display: flex; flex-direction: column;
    overflow: hidden;
}
.month-grid .mg-cell:hover {
    background: var(--surface-hover);
    transition: background 0.15s;
}
.month-grid .mg-cell:nth-child(7n) { border-right: none; }
.month-grid .mg-cell.outside {
    background: var(--bg);
    opacity: 0.4;
}
.month-grid .mg-cell.today-cell {
    background: linear-gradient(180deg, rgba(232, 93, 38, 0.06) 0%, var(--surface) 80px);
}
.mg-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    margin-bottom: 4px;
    line-height: 1;
}
.mg-cell.today-cell .mg-date { color: var(--orange); font-weight: 600; }
.mg-events { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; flex: 1; }
.mg-events::-webkit-scrollbar { width: 0; }
.mg-ev {
    font-size: 9px; font-weight: 500;
    padding: 2px 5px;
    border-radius: 3px;
    border-left: 2px solid var(--blue);
    background: var(--blue-dim);
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.4;
    cursor: default;
}
.mg-ev.dc { border-left-color: var(--red); background: var(--red-dim); }

/* ═══════════════════════════════════════════
   DAY VIEW
   ═══════════════════════════════════════════ */
.day-view {
    margin-bottom: 48px;
}
.dv-header {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.5px;
}
.dv-event {
    display: flex; gap: 16px;
    padding: 16px;
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius-lg);
    background: var(--surface);
    margin-bottom: 8px;
    transition: background 0.12s, transform 0.15s var(--ease-out-quint);
}
.dv-event:hover {
    background: var(--surface-raised);
    transform: translateY(-1px);
}
.dv-event.dc { border-left-color: var(--red); }
.dv-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    min-width: 110px;
    flex-shrink: 0;
    padding-top: 2px;
}
.dv-info { flex: 1; min-width: 0; }
.dv-name {
    font-size: 14px; font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
}
.dv-meta {
    display: flex; gap: 12px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-tertiary);
}
.dv-meta span { display: flex; align-items: center; gap: 4px; }

/* ═══════════════════════════════════════════
   CALENDAR GRID — DESKTOP (7-col)
   ═══════════════════════════════════════════ */
.calendar {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin-bottom: 48px;
    animation: scaleIn 0.35s var(--ease-out-quint) both;
}

.day-col {
    min-height: 220px;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border-light);
    background: var(--surface);
    min-width: 0;
    overflow: visible;
}
.day-col:last-child { border-right: none; }

/* Today column — warm amber glow */
.day-col.today {
    background: linear-gradient(180deg, rgba(232, 93, 38, 0.06) 0%, var(--surface) 180px);
}
.day-col.today .day-head {
    background: var(--orange);
}
.day-col.today .day-head .dname,
.day-col.today .day-head .dnum { color: #000 !important; }
.day-col.today .day-count { background: rgba(0,0,0,0.15); color: #000; }

.day-head {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-light);
    display: flex; justify-content: space-between;
    align-items: center;
    min-height: 48px;
}
.day-head-info { display: flex; align-items: baseline; gap: 6px; }

.day-head .dname {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-tertiary);
}
.day-head .dnum {
    font-size: 18px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
}

.day-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    padding: 2px 7px; border-radius: 10px;
}

.day-body {
    padding: 6px; flex: 1;
    display: flex; flex-direction: column;
    gap: 4px; overflow-y: auto;
}
.day-body::-webkit-scrollbar { width: 0; }

.day-body .empty-day {
    color: var(--text-muted);
    font-size: 18px; text-align: center;
    padding: 60px 8px; opacity: 0.3;
    font-weight: 400;
}

/* ═══════════════════════════════════════════
   EVENT CARDS
   ═══════════════════════════════════════════ */
.ev {
    padding: 8px 10px;
    border-radius: 6px;
    border-left: 3px solid var(--blue);
    background: var(--blue-dim);
    cursor: default;
    position: relative;
    transition: transform 0.15s var(--ease-out-quint), background 0.15s, box-shadow 0.2s;
    animation: enterUp 0.3s var(--ease-out-quint) both;
}
.ev.dc { border-left-color: var(--red); background: var(--red-dim); }

.ev:hover {
    transform: translateY(-2px);
    background: var(--blue-glow);
    box-shadow: 0 4px 16px rgba(59, 130, 246, 0.08);
    z-index: 100;
}
.ev.dc:hover {
    background: var(--red-glow);
    box-shadow: 0 4px 16px rgba(239, 68, 68, 0.08);
}

.ev-top {
    display: flex; align-items: center; gap: 5px;
    margin-bottom: 3px;
}

.ev-name {
    font-size: 12.5px; font-weight: 600;
    line-height: 1.3; letter-spacing: -0.1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
}

.ev-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.2px;
}

.ev-room {
    font-size: 10px; color: var(--text-tertiary);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Hover tooltip for desktop */
.ev-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%);
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    min-width: 220px; max-width: 280px;
    z-index: 200;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    pointer-events: none;
}
.ev-tooltip::after {
    content: '';
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--border);
}
.ev:hover .ev-tooltip { display: block; }

.ev-tooltip .tt-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 6px; line-height: 1.3;
}
.ev-tooltip .tt-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-secondary);
    padding: 2px 0;
}
.ev-tooltip .tt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
}
.ev-tooltip .tt-val { font-weight: 500; }

/* Status dot */
.status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    flex-shrink: 0;
    background: var(--green);
}
.status-dot.tentative { background: var(--yellow); }
.status-dot.prospect { background: var(--purple); }
.status-dot.closed { background: var(--text-tertiary); opacity: 0.4; }

/* ═══════════════════════════════════════════
   EMPTY WEEK
   ═══════════════════════════════════════════ */
.empty-week {
    grid-column: 1 / -1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 20px;
    color: var(--text-tertiary);
    background: var(--surface);
}
.empty-week .empty-icon {
    font-size: 36px; margin-bottom: 16px; opacity: 0.2;
}
.empty-week .empty-text {
    font-size: 14px; font-weight: 500; color: var(--text-secondary);
    margin-bottom: 6px;
}
.empty-week .empty-sub { font-size: 12px; }

/* ═══════════════════════════════════════════
   MOBILE DAY LIST (replaces grid < 768px)
   ═══════════════════════════════════════════ */
.day-list {
    display: none;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
}
.day-list-item {
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border-light);
}
.day-list-item.today-item {
    border-color: rgba(232, 93, 38, 0.3);
    background: linear-gradient(180deg, rgba(232, 93, 38, 0.06) 0%, var(--surface) 100%);
}
.day-list-item.empty-item {
    opacity: 0.5;
}
.day-list-item.empty-item .day-list-body { display: none; }

.day-list-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    min-height: 56px;
}
.today-item .day-list-head {
    background: var(--orange);
}
.today-item .day-list-head .dl-day,
.today-item .day-list-head .dl-date,
.today-item .day-list-head .dl-count { color: #000 !important; }

.day-list-head .dl-left {
    display: flex; align-items: baseline; gap: 8px;
}
.dl-day {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-tertiary);
}
.dl-date {
    font-size: 18px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
}
.dl-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    padding: 3px 8px; border-radius: 10px;
}
.today-item .dl-count { background: rgba(0,0,0,0.15); }

.day-list-body {
    padding: 4px 8px 10px;
    display: flex; flex-direction: column;
    gap: 6px;
}

/* Mobile event cards — bigger, roomier */
.m-ev {
    display: flex; gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    border-left: 3px solid var(--blue);
    background: var(--blue-dim);
    min-height: 52px;
    align-items: flex-start;
}
.m-ev.dc { border-left-color: var(--red); background: var(--red-dim); }

.m-ev-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
    background: var(--green);
}
.m-ev-dot.tentative { background: var(--yellow); }
.m-ev-dot.prospect { background: var(--purple); }
.m-ev-dot.closed { background: var(--text-tertiary); opacity: 0.4; }

.m-ev-content { flex: 1; min-width: 0; }
.m-ev-name {
    font-size: 14px; font-weight: 600;
    color: var(--text); line-height: 1.3;
    margin-bottom: 3px;
}
.m-ev-meta {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
}
.m-ev-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-secondary);
}
.m-ev-room {
    font-size: 11px; color: var(--text-tertiary);
}

/* ═══════════════════════════════════════════
   SECTION HEADERS
   ═══════════════════════════════════════════ */
.section-row {
    display: flex; justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    padding-top: 4px;
}
.section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-secondary);
}
.section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted);
}

/* ═══════════════════════════════════════════
   UPCOMING TABLE — desktop
   ═══════════════════════════════════════════ */
.table-wrap {
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin-bottom: 48px;
    background: var(--surface);
    max-height: 420px;
    display: flex;
    flex-direction: column;
}
.table-scroll {
    overflow-y: auto; flex: 1;
}
.table-scroll::-webkit-scrollbar { width: 4px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.table-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

.table-wrap table {
    width: 100%; border-collapse: collapse;
    font-size: 13px; table-layout: fixed;
}
.table-wrap col.c-date    { width: 13%; }
.table-wrap col.c-time    { width: 15%; }
.table-wrap col.c-event   { width: 25%; }
.table-wrap col.c-status  { width: 10%; }
.table-wrap col.c-loc     { width: 7%;  }
.table-wrap col.c-room    { width: 17%; }
.table-wrap col.c-contact { width: 13%; }

.table-wrap th {
    text-align: left; padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; z-index: 2;
}

.table-wrap td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    vertical-align: middle;
}
.table-wrap tr:last-child td { border-bottom: none; }
.table-wrap tbody tr {
    transition: background 0.12s;
    position: relative;
}
.table-wrap tbody tr:hover td { background: var(--surface-hover); }
.table-wrap tbody tr::after {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--orange);
    opacity: 0; transition: opacity 0.15s;
}
.table-wrap tbody tr:hover::after { opacity: 1; }

.table-wrap .name-cell { font-weight: 600; color: var(--text); }
.table-wrap .time-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2px;
}

/* ═══════════════════════════════════════════
   MOBILE UPCOMING CARDS (replaces table < 768px)
   ═══════════════════════════════════════════ */
.upcoming-cards {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 48px;
    max-height: 500px;
    overflow-y: auto;
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-light);
    padding: 8px;
    background: var(--surface);
}
.upcoming-cards::-webkit-scrollbar { width: 0; }

.uc-card {
    padding: 14px 16px;
    background: var(--surface-card);
    border-radius: var(--radius);
    border: 1px solid var(--border-subtle);
    display: flex; flex-direction: column; gap: 8px;
}
.uc-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px;
}
.uc-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    line-height: 1.3; flex: 1; min-width: 0;
}
.uc-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-tertiary);
    white-space: nowrap; flex-shrink: 0;
}
.uc-card-bottom {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
}
.uc-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-secondary);
}

/* Tags */
.tag {
    display: inline-flex; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    padding: 3px 8px; border-radius: 10px;
    line-height: 1;
}
.tag.nyc { background: var(--blue-dim); color: var(--blue-soft); }
.tag.dc  { background: var(--red-dim);  color: var(--red-soft); }

.tag.definite  { background: var(--green-dim);  color: var(--green); }
.tag.tentative { background: var(--yellow-dim); color: var(--yellow); }
.tag.prospect  { background: var(--purple-dim); color: var(--purple); }
.tag.closed    { background: var(--surface-raised); color: var(--text-tertiary); opacity: 0.6; }

.empty-row {
    text-align: center; color: var(--text-tertiary);
    padding: 48px 16px; font-size: 12px;
}
.empty-rooms { color: var(--text-tertiary); font-size: 11px; }
.error-msg { color: var(--red-soft); }

/* ═══════════════════════════════════════════
   ROOMS
   ═══════════════════════════════════════════ */
.rooms-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 72px;
}

.room-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    transition: border-color 0.12s, background 0.12s, transform 0.12s var(--ease);
}
.room-chip:hover {
    background: var(--surface-raised);
    border-color: var(--border);
    transform: translateY(-1px);
}
.room-chip .r-name {
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
}
.room-chip .r-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--orange);
    letter-spacing: -0.5px;
}

/* ═══════════════════════════════════════════
   ERROR & LOADING
   ═══════════════════════════════════════════ */
.loading {
    text-align: center; padding: 80px 20px;
    color: var(--text-tertiary); font-size: 12px;
}
.loading .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border-light);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
    background: var(--red-dim); color: var(--red-soft);
    padding: 12px 16px; border-radius: var(--radius);
    margin-bottom: 16px; font-size: 12px; display: none;
}

/* ═══════════════════════════════════════════
   KEYBOARD HINT
   ═══════════════════════════════════════════ */
.kb-hint {
    position: fixed; bottom: 16px; right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--text-muted);
    display: flex; gap: 6px; align-items: center;
    opacity: 0; animation: fadeHint 0.4s 2s forwards;
}
.kb-hint kbd {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 9px; font-family: inherit;
}
@keyframes fadeHint { to { opacity: 0.4; } }

/* ═══════════════════════════════════════════
   ENTRANCE CHOREOGRAPHY
   ═══════════════════════════════════════════ */
@keyframes enterUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes enterFade {
    from { opacity: 0; }
    to   { opacity: 1; }
}
@keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
}

.stats-bar {
    animation: enterUp 0.5s var(--ease-out-quint) both;
    animation-delay: 0.05s;
}
.week-bar {
    animation: enterUp 0.5s var(--ease-out-quint) both;
    animation-delay: 0.1s;
}
#calendarContainer {
    animation: enterFade 0.6s var(--ease-out-quint) both;
    animation-delay: 0.15s;
}
.section-row {
    animation: enterUp 0.4s var(--ease-out-quint) both;
    animation-delay: 0.25s;
}
.table-wrap, .upcoming-cards {
    animation: enterFade 0.5s var(--ease-out-quint) both;
    animation-delay: 0.3s;
}
.rooms-row {
    animation: enterFade 0.5s var(--ease-out-quint) both;
    animation-delay: 0.35s;
}

/* Event card stagger by column */
.day-col:nth-child(1) .ev { animation-delay: 0.02s; }
.day-col:nth-child(2) .ev { animation-delay: 0.04s; }
.day-col:nth-child(3) .ev { animation-delay: 0.06s; }
.day-col:nth-child(4) .ev { animation-delay: 0.08s; }
.day-col:nth-child(5) .ev { animation-delay: 0.10s; }
.day-col:nth-child(6) .ev { animation-delay: 0.12s; }
.day-col:nth-child(7) .ev { animation-delay: 0.14s; }
.ev:nth-child(2) { animation-delay: 30ms; }
.ev:nth-child(3) { animation-delay: 60ms; }
.ev:nth-child(4) { animation-delay: 90ms; }
.ev:nth-child(5) { animation-delay: 120ms; }

/* Today column pulse */
@keyframes todayGlow {
    0%, 100% { box-shadow: inset 0 2px 24px rgba(232, 93, 38, 0.03); }
    50%      { box-shadow: inset 0 2px 24px rgba(232, 93, 38, 0.07); }
}
.day-col.today { animation: todayGlow 4s ease-in-out infinite; }

/* Week change transition */
#calendarContainer { transition: opacity 0.15s; }
#calendarContainer.transitioning { opacity: 0.4; }

.loading { transition: opacity 0.2s; }

/* ═══════════════════════════════════════════
   REDUCED MOTION
   ═══════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
    }
    .day-col.today { animation: none; box-shadow: none; }
    #calendarContainer.transitioning { opacity: 1; }
    body::after { display: none; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — LARGE TABLET
   ═══════════════════════════════════════════ */
@media (max-width: 1100px) {
    .day-head .dnum { font-size: 15px; }
    .ev-name { font-size: 10.5px; }
    .ev-time { font-size: 9px; }
    .ev-room { display: none; }
    .ev-tooltip { display: none !important; }
    .stats-bar { gap: 24px; }
    .stat-value { font-size: 28px; }
}

@media (max-width: 960px) {
    .day-col { min-height: 170px; }
    .ev-top .status-dot { display: none; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-scroll table { min-width: 680px; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
    .topbar {
        height: auto; padding: 12px 16px;
        flex-direction: column; gap: 10px;
        align-items: stretch;
    }
    .topbar-left { justify-content: space-between; }
    .topbar-right { width: 100%; }
    .filter-strip { width: 100%; }
    .filter-btn, select.filter-btn {
        font-size: 11px; padding: 10px 16px;
        min-height: 44px; min-width: 44px;
        border-radius: 22px;
    }
    select.filter-btn { padding-right: 30px; }
    .refresh-ts { display: none; }

    .page { padding: 0 16px; }
    .stats-bar { gap: 20px; padding: 20px 0 16px; flex-wrap: wrap; }
    .stat-value { font-size: 28px; }
    .stats-divider { height: 18px; }

    .week-btn { width: 44px; height: 44px; font-size: 20px; border-radius: var(--radius); }
    .today-btn { padding: 10px 18px; font-size: 11px; }

    .view-btn { padding: 8px 12px; font-size: 9px; min-height: 36px; }

    /* Switch: hide grid, show day list (week view) */
    .calendar { display: none !important; }
    .day-list { display: flex; }

    /* Month grid mobile */
    .month-grid { grid-template-columns: repeat(7, 1fr); }
    .month-grid .mg-cell { min-height: 72px; padding: 6px; }
    .mg-date { font-size: 12px; }
    .mg-ev { font-size: 9px; padding: 2px 4px; }

    /* Day view mobile */
    .dv-event { flex-direction: column; gap: 6px; padding: 12px; }
    .dv-time { min-width: unset; font-size: 11px; }

    /* Switch: hide table, show cards */
    .table-wrap { display: none !important; }
    .upcoming-cards { display: flex; }

    .rooms-row { margin-bottom: 48px; }
    .kb-hint { display: none; }

    .ev-tooltip { display: none !important; }
}

@media (max-width: 480px) {
    .stats-bar { gap: 16px; }
    .stat-value { font-size: 24px; letter-spacing: -1.5px; }
    .stat-label { font-size: 9px; }
    .stats-divider { display: none; }

    .rooms-row { flex-direction: column; }
    .room-chip { justify-content: space-between; }

    .week-label { font-size: 11px; padding: 0 8px; }
}

/* ═══════════════════════════════════════════
   PRINT
   ═══════════════════════════════════════════ */
@media print {
    :root {
        --bg: #fff; --surface: #fff; --surface-raised: #f5f5f5;
        --text: #111; --text-secondary: #555; --text-tertiary: #888;
        --border: #ccc; --border-light: #ddd;
    }
    body { background: #fff; color: #111; }
    body::after { display: none; }
    .topbar { position: relative; background: #fff; backdrop-filter: none; }

    .day-col { min-height: auto; }
    .day-col.today { background: #fffbeb; }
    .day-col.today .day-head { background: #E85D26; }
    .ev { break-inside: avoid; }
    .kb-hint { display: none; }
    .ev-tooltip { display: none !important; }
}
</style>
</head>
<body>

<!-- ════════ NAV ════════ -->
<nav class="topbar" aria-label="Event filters">
    <div class="topbar-left">
        <h1 class="topbar-title">PUBKEY <span>EVENTS</span></h1>
    </div>
    <div class="topbar-right">
        <div class="filter-strip">
            <select class="filter-btn" id="statusFilter" aria-label="Filter by status">
                <option value="all">All Status</option>
                <option value="definite">Definite</option>
                <option value="tentative">Tentative</option>
                <option value="prospect">Prospect</option>
            </select>
            <select class="filter-btn" id="locationFilter" aria-label="Filter by location">
                <option value="all">All Locations</option>
                <option value="nyc">NYC</option>
                <option value="dc">DC</option>
            </select>
            <select class="filter-btn" id="roomFilter" aria-label="Filter by room">
                <option value="all">All Rooms</option>
            </select>
        </div>
        <span class="refresh-ts" id="lastRefresh"></span>
    </div>
</nav>

<!-- ════════ PAGE ════════ -->
<main class="page">
    <div class="error-banner" id="errorBanner"></div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-value" id="statTotal">&mdash;</span>
            <span class="stat-label" id="statSub">This Week</span>
        </div>
        <div class="stats-divider"></div>
        <div class="stat">
            <span class="stat-value nyc" id="statNYC">&mdash;</span>
            <span class="stat-label">NYC</span>
        </div>
        <div class="stats-divider"></div>
        <div class="stat">
            <span class="stat-value dc" id="statDC">&mdash;</span>
            <span class="stat-label">DC</span>
        </div>
    </div>

    <!-- Nav bar -->
    <div class="week-bar">
        <button class="week-btn" onclick="navigate(-1)" aria-label="Previous">&#8249;</button>
        <button class="week-btn" onclick="navigate(1)" aria-label="Next">&#8250;</button>
        <span class="week-label" id="weekLabel"></span>
        <button class="today-btn" onclick="navigate(0)">Today</button>
        <div class="view-toggle">
            <button class="view-btn active" onclick="setView('day')" data-view="day">Day</button>
            <button class="view-btn" onclick="setView('week')" data-view="week">Week</button>
            <button class="view-btn" onclick="setView('month')" data-view="month">Month</button>
        </div><span style="font-size:9px;color:var(--text-muted);margin-left:8px;font-family:'JetBrains Mono',monospace">1/2/3</span>
    </div>

    <!-- Calendar — desktop grid (week view) -->
    <div id="calendarContainer">
        <div class="loading"><div class="spinner"></div><br>Loading events...</div>
    </div>

    <!-- Calendar — mobile day list (week view) -->
    <div class="day-list" id="dayListContainer"></div>

    <!-- Month view -->
    <div id="monthContainer" style="display:none"></div>

    <!-- Day view -->
    <div id="dayViewContainer" style="display:none"></div>

    <!-- Rooms -->
    <div class="section-row">
        <span class="section-label">Rooms This Week</span>
    </div>
    <div class="rooms-row" id="roomsGrid"></div>
</main>

<div class="kb-hint" aria-hidden="true">
    <kbd>&larr;</kbd><kbd>&rarr;</kbd> navigate &nbsp; <kbd>T</kbd> today &nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> views
</div>

<!-- ════════ SCRIPT ════════ -->
<script>
var allItems = [];
var weekOffset = 0;
var monthOffset = 0;
var dayOffset = 0;
var currentView = "week";
var activeStatusFilter = "all";
var activeLocationFilter = "all";
var activeRoomFilter = "all";

/* ── API ── */
function apiItemToLocal(item) {
    var loc = item.location || '';
    var locKey = item.locKey || (loc.toLowerCase().indexOf('dc') !== -1 ? 'dc' : 'nyc');
    return {
        name: item.name || '',
        status: (item.status || '').toLowerCase(),
        start: item.start || '',
        end: item.end || null,
        location: loc,
        locKey: locKey,
        room: item.room || '',
        guest_count: item.guest_count || 0,
        contact: item.contact || '',
        eventStyle: item.event_style || '',
        type: item.type || ''
    };
}

function loadEvents() {
    fetch("/api/events")
        .then(function(res) {
            if (!res.ok) throw new Error("API returned " + res.status);
            return res.json();
        })
        .then(function(data) {
            allItems = (data.items || []).map(apiItemToLocal);
            allItems.sort(function(a, b) { return a.start.localeCompare(b.start); });
            document.getElementById("statSub").textContent = data.source === "tripleseat" ? "Live" : "This Week";
            populateRoomFilter();
            renderWeek();
        })
        .catch(function(err) {
            document.getElementById("errorBanner").textContent = "Failed to load events: " + err.message;
            document.getElementById("errorBanner").style.display = "block";
            document.getElementById("calendarContainer").innerHTML =
                '<div class="loading error-msg">Could not reach /api/events</div>';
        });
}

/* ── Helpers ── */
function getWeekRange(offset) {
    var now = new Date();
    var day = now.getDay();
    var monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
    monday.setHours(0, 0, 0, 0);
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23, 59, 59, 999);
    return { start: monday, end: sunday };
}

function fmt(d) { return d.toISOString().slice(0, 10); }
var _timeFmt = new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
var _dateFmt = new Intl.DateTimeFormat("en-US", { weekday: "short", month: "short", day: "numeric" });
var _dayDateFmt = new Intl.DateTimeFormat("en-US", { day: "numeric" });
var _dayMonFmt = new Intl.DateTimeFormat("en-US", { month: "short" });
var _mobileDateFmt = new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric" });

function fmtTime(iso) {
    if (!iso) return "";
    return _timeFmt.format(new Date(iso)).toLowerCase();
}
function fmtDate(iso) {
    if (!iso) return "";
    return _dateFmt.format(new Date(iso));
}

var _escEl = document.createElement("div");
function esc(s) { _escEl.textContent = s; return _escEl.innerHTML; }

function getFiltered() {
    return allItems.filter(function(item) {
        if (activeStatusFilter !== "all" && item.status !== activeStatusFilter) return false;
        if (activeLocationFilter !== "all" && item.locKey !== activeLocationFilter) return false;
        if (activeRoomFilter !== "all" && item.room !== activeRoomFilter) return false;
        return true;
    });
}

function getWeekItems(items, range) {
    return items.filter(function(item) {
        var d = new Date(item.start);
        return d >= range.start && d <= range.end;
    });
}

function populateRoomFilter() {
    var rooms = [], seen = {};
    allItems.forEach(function(i) {
        if (i.room && !seen[i.room]) { rooms.push(i.room); seen[i.room] = true; }
    });
    rooms.sort();
    var sel = document.getElementById("roomFilter");
    var current = sel.value;
    sel.innerHTML = '<option value="all">All Rooms</option>';
    rooms.forEach(function(r) {
        var opt = document.createElement("option");
        opt.value = r; opt.textContent = r;
        sel.appendChild(opt);
    });
    sel.value = rooms.indexOf(current) !== -1 ? current : "all";
    activeRoomFilter = sel.value;
}

/* ── Date Range Helpers ── */
function getMonthRange(offset) {
    var now = new Date();
    var first = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    var last = new Date(first.getFullYear(), first.getMonth() + 1, 0, 23, 59, 59, 999);
    return { start: first, end: last };
}

function getDayRange(offset) {
    var now = new Date();
    var day = new Date(now);
    day.setDate(now.getDate() + offset);
    day.setHours(0, 0, 0, 0);
    var dayEnd = new Date(day);
    dayEnd.setHours(23, 59, 59, 999);
    return { start: day, end: dayEnd };
}

/* ── View Switching ── */
function setView(view) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-view') === view);
    });
    renderAll();
}

function navigate(dir) {
    if (dir === 0) {
        weekOffset = 0; monthOffset = 0; dayOffset = 0;
    } else if (currentView === 'week') {
        weekOffset += dir;
    } else if (currentView === 'month') {
        monthOffset += dir;
    } else if (currentView === 'day') {
        dayOffset += dir;
    }
    renderAll();
}

/* ── Render ── */
function renderAll() {
    var items = getFiltered();
    var range, viewItems;

    if (currentView === 'week') {
        range = getWeekRange(weekOffset);
        var opts = { month: "short", day: "numeric" };
        var endOpts = { month: "short", day: "numeric", year: "numeric" };
        document.getElementById("weekLabel").textContent =
            range.start.toLocaleDateString("en-US", opts) + " \u2013 " + range.end.toLocaleDateString("en-US", endOpts);
        viewItems = getWeekItems(items, range);

        document.getElementById("calendarContainer").style.display = "";
        document.getElementById("dayListContainer").style.display = "";
        document.getElementById("monthContainer").style.display = "none";
        document.getElementById("dayViewContainer").style.display = "none";

        renderCalendar(viewItems, range);
        renderDayList(viewItems, range);
    } else if (currentView === 'month') {
        range = getMonthRange(monthOffset);
        document.getElementById("weekLabel").textContent =
            range.start.toLocaleDateString("en-US", { month: "long", year: "numeric" });
        viewItems = getWeekItems(items, range);

        document.getElementById("calendarContainer").style.display = "none";
        document.getElementById("dayListContainer").style.display = "none";
        document.getElementById("monthContainer").style.display = "";
        document.getElementById("dayViewContainer").style.display = "none";

        renderMonth(items, range);
    } else if (currentView === 'day') {
        range = getDayRange(dayOffset);
        var dayLabel = range.start.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
        document.getElementById("weekLabel").textContent = dayLabel;
        viewItems = getWeekItems(items, range);

        document.getElementById("calendarContainer").style.display = "none";
        document.getElementById("dayListContainer").style.display = "none";
        document.getElementById("monthContainer").style.display = "none";
        document.getElementById("dayViewContainer").style.display = "";

        renderDayView(viewItems, range);
    }

    // Stats always reflect current view's range
    var nycCount = 0, dcCount = 0;
    (viewItems || []).forEach(function(item) {
        if (item.locKey === 'nyc') nycCount++; else if (item.locKey === 'dc') dcCount++;
    });
    animateValue(document.getElementById("statTotal"), (viewItems || []).length);
    animateValue(document.getElementById("statNYC"), nycCount);
    animateValue(document.getElementById("statDC"), dcCount);

    document.getElementById("lastRefresh").textContent =
        new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    document.getElementById("statSub").textContent =
        currentView === 'day' ? 'Today' : currentView === 'month' ? 'This Month' : 'This Week';

    renderRooms(viewItems || []);
}

// Keep renderWeek for backwards compat with init
function renderWeek() { renderAll(); }
function render() { renderAll(); }

function buildTooltipHTML(item) {
    var ts = fmtTime(item.start);
    var te = fmtTime(item.end);
    var timeStr = te ? ts + ' – ' + te : ts;
    var parts = [
        '<div class="ev-tooltip">',
        '<div class="tt-name">' + esc(item.name) + '</div>'
    ];
    if (timeStr) {
        parts.push('<div class="tt-row"><span class="tt-label">Time</span><span class="tt-val">' + timeStr + '</span></div>');
    }
    if (item.room) {
        parts.push('<div class="tt-row"><span class="tt-label">Room</span><span class="tt-val">' + esc(item.room) + '</span></div>');
    }
    if (item.status) {
        parts.push('<div class="tt-row"><span class="tt-label">Status</span><span class="tt-val">' + esc(item.status) + '</span></div>');
    }
    if (item.contact) {
        parts.push('<div class="tt-row"><span class="tt-label">Contact</span><span class="tt-val">' + esc(item.contact) + '</span></div>');
    }
    if (item.guest_count) {
        parts.push('<div class="tt-row"><span class="tt-label">Guests</span><span class="tt-val">' + item.guest_count + '</span></div>');
    }
    parts.push('</div>');
    return parts.join('');
}

function renderCalendar(items, range) {
    var today = fmt(new Date());
    var grouped = {};
    for (var i = 0; i < 7; i++) {
        var d = new Date(range.start);
        d.setDate(range.start.getDate() + i);
        grouped[fmt(d)] = [];
    }
    items.forEach(function(item) {
        var key = item.start.slice(0, 10);
        if (grouped[key]) grouped[key].push(item);
    });

    if (items.length === 0) {
        document.getElementById("calendarContainer").innerHTML =
            '<div class="calendar"><div class="empty-week">' +
            '<div class="empty-icon">\u2205</div>' +
            '<div class="empty-text">No events this week</div>' +
            '<div class="empty-sub">Try a different week or adjust your filters</div>' +
            '</div></div>';
        return;
    }

    var parts = ['<div class="calendar">'];
    var dayNames = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

    for (var i = 0; i < 7; i++) {
        var d = new Date(range.start);
        d.setDate(range.start.getDate() + i);
        var key = fmt(d);
        var isToday = key === today;
        var dayItems = (grouped[key] || []).sort(function(a, b) { return a.start.localeCompare(b.start); });
        var count = dayItems.length;

        parts.push(
            '<div class="day-col', isToday ? ' today' : '', '">',
            '<div class="day-head">',
            '<div class="day-head-info">',
            '<span class="dname">', dayNames[i], '</span>',
            '<span class="dnum">', _dayDateFmt.format(d), '</span>',
            '</div>',
            count > 0 ? '<span class="day-count">' + count + '</span>' : '',
            '</div>',
            '<div class="day-body">'
        );

        if (dayItems.length === 0) {
            parts.push('<div class="empty-day">\u00B7</div>');
        } else {
            for (var j = 0; j < dayItems.length; j++) {
                var item = dayItems[j];
                var isDC = item.locKey === 'dc';
                var sc = item.status.replace(/\s+/g, "-");
                var ts = fmtTime(item.start);
                var te = fmtTime(item.end);

                parts.push(
                    '<div class="ev', isDC ? ' dc' : '', '">',
                    '<div class="ev-top">',
                    '<span class="status-dot ', sc, '"></span>',
                    '<span class="ev-name">', esc(item.name), '</span>',
                    '</div>',
                    '<div class="ev-time">', te ? ts + ' \u2013 ' + te : ts, '</div>'
                );
                if (item.room) parts.push('<div class="ev-room">', esc(item.room), '</div>');
                parts.push(buildTooltipHTML(item));
                parts.push('</div>');
            }
        }
        parts.push('</div></div>');
    }
    parts.push('</div>');
    document.getElementById("calendarContainer").innerHTML = parts.join('');
}

/* ── Month Grid ── */
function renderMonth(allFilteredItems, range) {
    var today = fmt(new Date());
    var year = range.start.getFullYear();
    var month = range.start.getMonth();
    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month + 1, 0);

    // Start grid on Monday
    var startDow = firstDay.getDay();
    var gridStart = new Date(firstDay);
    gridStart.setDate(firstDay.getDate() - (startDow === 0 ? 6 : startDow - 1));

    // Group all filtered items by date
    var grouped = {};
    allFilteredItems.forEach(function(item) {
        var key = item.start.slice(0, 10);
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(item);
    });

    var parts = ['<div class="month-grid">'];
    var dayNames = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
    for (var h = 0; h < 7; h++) {
        parts.push('<div class="mg-header">' + dayNames[h] + '</div>');
    }

    // Render 6 weeks of cells
    var cellDate = new Date(gridStart);
    for (var c = 0; c < 42; c++) {
        var key = fmt(cellDate);
        var isOutside = cellDate.getMonth() !== month;
        var isToday = key === today;
        var cls = 'mg-cell' + (isOutside ? ' outside' : '') + (isToday ? ' today-cell' : '');
        var dayEvents = (grouped[key] || []).sort(function(a, b) { return a.start.localeCompare(b.start); });

        parts.push('<div class="' + cls + '" onclick="goToDate(\'' + key + '\')" style="cursor:pointer">');
        parts.push('<div class="mg-date">' + cellDate.getDate() + '</div>');
        if (dayEvents.length > 0) {
            parts.push('<div class="mg-events">');
            var show = Math.min(dayEvents.length, 3);
            for (var j = 0; j < show; j++) {
                var item = dayEvents[j];
                var isDC = item.locKey === 'dc';
                parts.push('<div class="mg-ev' + (isDC ? ' dc' : '') + '">' + esc(item.name) + '</div>');
            }
            if (dayEvents.length > 3) {
                parts.push('<div style="font-size:8px;color:var(--text-tertiary);padding:1px 4px">+' + (dayEvents.length - 3) + ' more</div>');
            }
            parts.push('</div>');
        }
        parts.push('</div>');
        cellDate.setDate(cellDate.getDate() + 1);
    }
    parts.push('</div>');
    document.getElementById("monthContainer").innerHTML = parts.join('');
}

function goToDate(dateStr) {
    var target = new Date(dateStr + 'T12:00:00');
    var now = new Date();
    now.setHours(12, 0, 0, 0);
    var diff = Math.round((target - now) / (1000 * 60 * 60 * 24));
    dayOffset = diff;
    setView('day');
}

/* ── Day View ── */
function renderDayView(items, range) {
    var sorted = items.sort(function(a, b) { return a.start.localeCompare(b.start); });
    var container = document.getElementById("dayViewContainer");

    if (sorted.length === 0) {
        container.innerHTML = '<div class="day-view"><div class="empty-week" style="border-radius:var(--radius-xl);border:1px solid var(--border-light)">' +
            '<div class="empty-icon">\u2205</div>' +
            '<div class="empty-text">No events this day</div>' +
            '<div class="empty-sub">Try a different day or adjust your filters</div>' +
            '</div></div>';
        return;
    }

    var parts = ['<div class="day-view">'];
    for (var i = 0; i < sorted.length; i++) {
        var item = sorted[i];
        var isDC = item.locKey === 'dc';
        var sc = item.status.replace(/\s+/g, "-");
        var ts = fmtTime(item.start);
        var te = fmtTime(item.end);

        parts.push(
            '<div class="dv-event' + (isDC ? ' dc' : '') + '">',
            '<div class="dv-time">' + (te ? ts + ' \u2013 ' + te : ts) + '</div>',
            '<div class="dv-info">',
            '<div class="dv-name">' + esc(item.name) + '</div>',
            '<div class="dv-meta">'
        );
        if (item.room) parts.push('<span>\uD83D\uDCCD ' + esc(item.room) + '</span>');
        if (item.status) parts.push('<span><span class="status-dot ' + sc + '"></span> ' + esc(item.status) + '</span>');
        if (item.locKey) parts.push('<span class="tag ' + item.locKey + '">' + (item.locKey === 'dc' ? 'DC' : 'NYC') + '</span>');
        if (item.contact) parts.push('<span>' + esc(item.contact) + '</span>');
        if (item.guest_count) parts.push('<span>' + item.guest_count + ' guests</span>');
        parts.push('</div></div></div>');
    }
    parts.push('</div>');
    container.innerHTML = parts.join('');
}

/* ── Upcoming Table (desktop) ── */

            '<td class="name-cell">' + esc(item.name) + '</td>' +

function renderRooms(items) {
    var rooms = {};
    items.forEach(function(item) {
        if (item.room) rooms[item.room] = (rooms[item.room] || 0) + 1;
    });
    var sorted = Object.entries(rooms).sort(function(a, b) { return b[1] - a[1]; });
    var grid = document.getElementById("roomsGrid");
    if (sorted.length === 0) {
        grid.innerHTML = '<div class="empty-rooms">No room bookings this week</div>';
        return;
    }
    grid.innerHTML = sorted.map(function(pair) {
        return '<div class="room-chip">' +
            '<span class="r-count">' + pair[1] + '</span>' +
            '<span class="r-name">' + esc(pair[0]) + '</span>' +
            '</div>';
    }).join('');
}

function changeWeek(dir) {
    navigate(dir);
}

document.getElementById("statusFilter").addEventListener("change", function() {
    activeStatusFilter = this.value; render();
});
document.getElementById("locationFilter").addEventListener("change", function() {
    activeLocationFilter = this.value; render();
});
document.getElementById("roomFilter").addEventListener("change", function() {
    activeRoomFilter = this.value; render();
});

/* ── Keyboard ── */
document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
    if (e.key === "ArrowLeft") { navigate(-1); e.preventDefault(); }
    else if (e.key === "ArrowRight") { navigate(1); e.preventDefault(); }
    else if (e.key === "t" || e.key === "T") { navigate(0); }
    else if (e.key === "1") { setView('day'); }
    else if (e.key === "2") { setView('week'); }
    else if (e.key === "3") { setView('month'); }
});

/* ── Touch swipe for mobile week nav ── */
(function() {
    var startX = 0;
    var startY = 0;
    var tracking = false;
    var threshold = 60;

    document.addEventListener('touchstart', function(e) {
        if (e.target.closest('.filter-strip') || e.target.closest('.table-scroll') || e.target.closest('.upcoming-cards')) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        tracking = true;
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
        if (!tracking) return;
        tracking = false;
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy) * 1.5) {
            navigate(dx > 0 ? -1 : 1);
        }
    }, { passive: true });
})();

/* ── Animations ── */
var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function animateValue(el, target) {
    if (prefersReducedMotion) { el.textContent = target; return; }
    var current = parseInt(el.textContent) || 0;
    if (current === target) return;
    var diff = target - current;
    var steps = Math.min(Math.abs(diff), 12);
    var duration = 300;
    var stepTime = duration / steps;
    var step = 0;

    el.classList.add('updating');
    setTimeout(function() { el.classList.remove('updating'); }, 80);

    function tick() {
        step++;
        var progress = step / steps;
        var eased = 1 - Math.pow(1 - progress, 5);
        el.textContent = Math.round(current + diff * eased);
        if (step < steps) setTimeout(tick, stepTime);
    }
    setTimeout(tick, 100);
}

var _origNavigate = navigate;
navigate = function(dir) {
    if (prefersReducedMotion) { _origNavigate(dir); return; }

    var cal = document.getElementById('calendarContainer');
    var month = document.getElementById('monthContainer');
    var dayV = document.getElementById('dayViewContainer');
    var label = document.getElementById('weekLabel');

    if (dir !== 0) {
        label.classList.add(dir < 0 ? 'slide-left' : 'slide-right');
    }

    cal.classList.add('transitioning');

    setTimeout(function() {
        _origNavigate(dir);
        label.classList.remove('slide-left', 'slide-right');
        requestAnimationFrame(function() {
            cal.classList.remove('transitioning');
        });
    }, 120);
};

// Filter flash feedback
['statusFilter', 'locationFilter', 'roomFilter'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('change', function() {
        if (prefersReducedMotion) return;
        el.classList.add('flash');
        setTimeout(function() { el.classList.remove('flash'); }, 300);
    });
});
