<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubKey — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" media="print" onload="this.media='all'">
<style>

:root {
    --bg: #0c0c0e;
    --surface: #141416;
    --surface-raised: #1c1c1f;
    --surface-hover: #222226;
    --text: #e5e5ea;
    --text-secondary: #a8a8b0;
    --text-tertiary: #737378;
    --today-bg: #1a1810;
    --shadow-card: rgba(0, 0, 0, 0.3);
    --border: #2c2c2e;
    --border-light: #1f1f22;
    --orange: #f59e0b;
    --orange-dim: rgba(245, 158, 11, 0.10);
    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.12);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251, 191, 36, 0.10);
    --red: #f472b6;
    --red-dim: rgba(244, 114, 182, 0.10);
    --purple: #a78bfa;
    --purple-dim: rgba(167, 139, 250, 0.10);
    --blue: #60a5fa;
    --blue-dim: rgba(96, 165, 250, 0.10);
    --ease: cubic-bezier(0.25, 1, 0.5, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

/* ---- Topbar ---- */
.topbar {
    border-bottom: 1px solid var(--border-light);
    padding: 0 clamp(20px, 4vw, 48px);
    height: 52px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px) saturate(1.6);
    -webkit-backdrop-filter: blur(20px) saturate(1.6);
    background: rgba(12, 12, 14, 0.85);
}

.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-img { height: 24px; width: auto; opacity: 0.85; }


.topbar-right { display: flex; align-items: center; gap: 6px; }

.topbar-right select {
    font-size: 12px; padding: 5px 28px 5px 10px; border-radius: 6px;
    border: 1px solid var(--border-light); background: var(--surface);
    color: var(--text-secondary); cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    transition: all 0.2s var(--ease);
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%2348484a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 9px center;
}
.topbar-right select:hover { border-color: var(--border); color: var(--text); }
.topbar-right select:focus { outline: none; box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15); border-color: var(--blue); }

.refresh-indicator {
    font-size: 10px; color: var(--text-tertiary);
    font-family: 'JetBrains Mono', monospace;
    margin-left: 2px;
}

/* ---- Main ---- */
.main { max-width: 1380px; margin: 0 auto; padding: 32px clamp(20px, 4vw, 48px) 64px; }

/* ---- Stats Row ---- */
.stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin-bottom: 32px;
}

.stat-card {
    background: var(--surface);
    padding: 20px 22px 18px;
    border-radius: 12px;
    border: 1px solid var(--border-light);
    display: flex; flex-direction: column; gap: 0;
    transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--border); }

.stat-card .label {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-tertiary);
    margin-bottom: 8px;
}
.stat-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px; font-weight: 500; color: var(--text);
    letter-spacing: -2px; line-height: 1;
    margin-bottom: 4px;
}
.stat-card .sub {
    font-size: 12px; color: var(--text-tertiary);
    letter-spacing: 0.1px;
}
.stat-card.accent-orange .value { color: var(--orange); }
.stat-card.accent-blue .value { color: var(--blue); }
.stat-card.accent-red .value { color: var(--red); }

/* ---- Week Nav ---- */
.week-nav {
    display: flex; align-items: center; gap: 6px; margin-bottom: 16px;
}

.week-nav .nav-btn {
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: 8px; width: 34px; height: 34px; font-size: 14px;
    cursor: pointer; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s var(--ease);
    font-family: system-ui;
}
.week-nav .nav-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface-raised); }
.week-nav .nav-btn:active { transform: scale(0.95); }

.week-nav .week-label {
    font-size: 14px; font-weight: 600; color: var(--text);
    padding: 0 8px;
    letter-spacing: -0.3px;
}

.week-nav .today-btn {
    font-size: 12px; color: var(--blue); cursor: pointer;
    font-weight: 500; background: none; border: none; padding: 0 6px;
    font-family: 'Space Grotesk', sans-serif;
    transition: opacity 0.15s;
    margin-left: 2px;
}
.week-nav .today-btn:hover { opacity: 0.6; }

/* ---- Focus Visible ---- */
.nav-btn:focus-visible,
.today-btn:focus-visible,
.topbar-right select:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
}
.topbar-right select:focus-visible { box-shadow: none; }

/* ---- Visually Hidden ---- */
.sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ---- Table alignment classes ---- */
.text-right { text-align: right; }
.empty-table-cell {
    text-align: center; color: var(--text-tertiary);
    padding: 32px; font-size: 12px;
}

/* ---- Calendar Grid ---- */
.calendar {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 0; margin-bottom: 40px;
    border: 1px solid var(--border-light); border-radius: 12px; overflow: hidden;
}

.day-col {
    background: var(--surface);
    min-height: 220px; display: flex; flex-direction: column;
    contain: content;
    border-right: 1px solid var(--border-light);
    min-width: 0;
    overflow: hidden;
}
.day-col:last-child { border-right: none; }

.day-col.today { background: var(--today-bg); }

.day-head {
    padding: 10px 10px 8px;
    border-bottom: 1px solid var(--border-light);
    display: flex; justify-content: space-between; align-items: flex-start;
}

.day-col.today .day-head {
    background: var(--orange);
    border-bottom-color: var(--orange);
}
.day-col.today .day-head * { color: #fff !important; }

.day-head-left {}
.day-head .dname {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-tertiary);
}
.day-head .ddate {
    font-size: 20px; font-weight: 600; margin-top: 0;
    letter-spacing: -0.5px; line-height: 1.2;
}

.day-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    padding: 1px 6px; border-radius: 10px;
    margin-top: 2px;
}
.day-col.today .day-count { background: rgba(255,255,255,0.2); }

.day-body {
    padding: 5px; flex: 1; display: flex; flex-direction: column;
    gap: 3px; overflow-y: auto;
}

.day-body::-webkit-scrollbar { width: 2px; }
.day-body::-webkit-scrollbar-track { background: transparent; }
.day-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

.day-body .empty {
    color: var(--text-tertiary); font-size: 11px; text-align: center;
    padding: 48px 8px; font-weight: 400; line-height: 1.5;
    opacity: 0.4;
}

/* ---- Empty Week ---- */
.empty-week {
    grid-column: 1 / -1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 20px;
    color: var(--text-tertiary);
    text-align: center;
    background: var(--surface);
}
.empty-week img {
    width: 120px; height: 120px; object-fit: contain;
    opacity: 0.12; margin-bottom: 16px;
    filter: grayscale(1) invert(1);
}
.empty-week .empty-text {
    font-size: 13px; font-weight: 500; margin-bottom: 4px;
    color: var(--text-secondary);
}
.empty-week .empty-sub {
    font-size: 11px; color: var(--text-tertiary);
}

/* ---- Event Cards ---- */
.ev-card {
    padding: 7px 9px; border-radius: 6px;
    border-left: 2.5px solid var(--blue);
    background: var(--blue-dim); font-size: 12px;
    transition: transform 0.15s var(--ease), box-shadow 0.15s;
    cursor: default;
}
.ev-card:hover {
    transform: translateY(-1px);
}

.ev-card.dc { border-left-color: var(--red); background: var(--red-dim); }

.ev-card .ev-badges {
    display: flex; gap: 3px; align-items: center; margin-bottom: 2px;
}

.loc-tag {
    font-size: 9px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.4px; padding: 1px 5px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
}
.loc-tag.nyc { background: var(--blue-dim); color: var(--blue); }
.loc-tag.dc { background: var(--red-dim); color: var(--red); }

.status-tag {
    font-size: 9px; font-weight: 500; padding: 1px 5px;
    border-radius: 3px; background: var(--surface-raised); color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.3px;
}
.status-tag.definite { background: var(--green-dim); color: var(--green); }
.status-tag.tentative { background: var(--yellow-dim); color: var(--yellow); }
.status-tag.prospect { background: var(--purple-dim); color: var(--purple); }
.status-tag.closed { opacity: 0.5; }

.ev-card .ev-name {
    font-weight: 600; font-size: 12px; margin-bottom: 1px;
    line-height: 1.3; letter-spacing: -0.1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ev-card .ev-time {
    color: var(--text-secondary); font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
}
.ev-card .ev-meta {
    font-size: 10px; color: var(--text-tertiary); margin-top: 1px;
}

/* ---- Section ---- */
.section-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
}
.section-title {
    font-size: 11px; font-weight: 600; margin: 0;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-tertiary); text-transform: uppercase;
    letter-spacing: 1.2px;
}
.section-count {
    font-size: 11px; color: var(--text-tertiary);
    font-family: 'JetBrains Mono', monospace;
}

/* ---- Table ---- */
.table-wrap {
    background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border-light);
    overflow: hidden; margin-bottom: 40px;
    content-visibility: auto;
    contain-intrinsic-size: auto 600px;
}

.table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
.table-wrap col.col-date { width: 12%; }
.table-wrap col.col-time { width: 14%; }
.table-wrap col.col-event { width: 22%; }
.table-wrap col.col-status { width: 9%; }
.table-wrap col.col-loc { width: 7%; }
.table-wrap col.col-room { width: 16%; }
.table-wrap col.col-contact { width: 15%; }

.table-wrap th {
    text-align: left; padding: 10px 16px; font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-tertiary);
    background: var(--surface-raised); border-bottom: 1px solid var(--border-light);
    font-family: 'JetBrains Mono', monospace;
}

.table-wrap td {
    padding: 11px 16px; border-bottom: 1px solid var(--border-light); vertical-align: middle;
    color: var(--text-secondary);
}
.table-wrap tr:last-child td { border-bottom: none; }
.table-wrap tbody tr { transition: background 0.1s; }
.table-wrap tbody tr:hover td { background: var(--surface-raised); }
.table-wrap td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.table-wrap .name-cell { font-weight: 600; color: var(--text); }
.table-wrap .time-cell { font-family: 'JetBrains Mono', monospace; font-size: 11px; white-space: nowrap; }

/* ---- Rooms ---- */
.rooms-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px; margin-bottom: 40px;
}

.room-card {
    background: var(--surface); padding: 14px 16px;
    border-radius: 10px; border: 1px solid var(--border-light);
    display: flex; justify-content: space-between; align-items: center;
    transition: border-color 0.15s, background 0.15s;
}
.room-card:hover { background: var(--surface-raised); border-color: var(--border); }
.room-card .room-name { font-weight: 500; font-size: 12px; color: var(--text-secondary); }
.room-card .room-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 500; color: var(--orange);
    letter-spacing: -0.5px;
}

/* ---- Loading ---- */
.loading {
    text-align: center; padding: 80px 20px; color: var(--text-tertiary);
    font-size: 12px; letter-spacing: 0.3px;
}

.loading .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border-light); border-top-color: var(--orange);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
    background: var(--red-dim); color: var(--red); padding: 10px 16px;
    border-radius: 8px; margin-bottom: 20px; font-size: 12px; display: none;
}

/* ---- Keyboard hint ---- */
.kb-hint {
    position: fixed; bottom: 16px; right: 16px;
    font-size: 10px; color: var(--text-tertiary);
    font-family: 'JetBrains Mono', monospace;
    display: flex; gap: 6px; align-items: center;
    opacity: 0; animation: fadeIn 0.5s 1.5s forwards;
}
.kb-hint kbd {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 10px; font-family: inherit;
}
@keyframes fadeIn { to { opacity: 1; } }

/* ---- Reduced motion ---- */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
    }
}

/* ---- Responsive: Tablet landscape ---- */
@media (max-width: 1200px) {
    .calendar { grid-template-columns: repeat(7, 1fr); }
    .day-head .ddate { font-size: 16px; }
    .ev-card .ev-name { font-size: 11px; }
    .ev-card .ev-time { font-size: 9px; }
    .ev-card .ev-badges { display: none; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
}

/* ---- Responsive: Tablet portrait ---- */
@media (max-width: 960px) {
    .calendar { grid-template-columns: repeat(7, 1fr); }
    .day-col { min-height: 180px; }
    .ev-card { padding: 5px 7px; }
    .ev-card .ev-meta { display: none; }

    /* Table: horizontal scroll */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap table { min-width: 700px; }
}

/* ---- Responsive: Mobile ---- */
@media (max-width: 768px) {
    .topbar {
        height: auto; padding: 12px 16px;
        flex-direction: column; gap: 10px;
    }
    .topbar-right { flex-wrap: wrap; justify-content: center; gap: 8px; }
    .topbar-right select {
        font-size: 13px; padding: 8px 32px 8px 12px;
        min-height: 44px;
    }

    .main { padding: 20px 16px 40px; }

    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 16px 18px 14px; }
    .stat-card .value { font-size: 28px; }

    .week-nav { gap: 8px; }
    .week-nav .nav-btn { width: 44px; height: 44px; font-size: 18px; }
    .week-nav .week-label { font-size: 12px; }

    .calendar {
        grid-template-columns: repeat(2, 1fr);
        border-radius: 10px;
    }
    .day-col { min-height: 120px; }
    .day-head { padding: 8px 8px 6px; }
    .day-head .dname { font-size: 9px; letter-spacing: 0.4px; }
    .day-head .ddate { font-size: 15px; }
    .day-count { font-size: 9px; padding: 1px 5px; }
    .day-body { padding: 4px; gap: 3px; }
    .ev-card { padding: 6px 8px; border-radius: 5px; border-left-width: 2px; }
    .ev-card .ev-badges { display: none; }
    .ev-card .ev-name { font-size: 11px; }
    .ev-card .ev-time { font-size: 9px; }
    .ev-card .ev-meta { display: none; }

    .table-wrap table { min-width: 640px; }
    .table-wrap th, .table-wrap td { padding: 8px 10px; }

    .rooms-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }

    .kb-hint { display: none; }
}

/* ---- Responsive: Small mobile ---- */
@media (max-width: 480px) {
    .calendar { grid-template-columns: 1fr; }
    .day-col { min-height: auto; }
    .day-col:empty { display: none; }
    .day-head { padding: 10px 10px 8px; }
    .day-head .dname { font-size: 10px; }
    .day-head .ddate { font-size: 16px; }
    .day-body { padding: 5px; gap: 3px; }
    .ev-card .ev-name { font-size: 12px; }
    .ev-card .ev-time { font-size: 10px; }
    .ev-card .ev-badges { display: flex; }

    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .stat-card .value { font-size: 24px; letter-spacing: -1px; }
    .stat-card .label { font-size: 9px; }

    .section-title { font-size: 10px; }
    .rooms-grid { grid-template-columns: 1fr; }
}

@media print {
    :root {
        --bg: #fff; --surface: #fff; --surface-raised: #f5f5f5;
        --text: #111; --text-secondary: #555; --text-tertiary: #999;
        --border: #ccc; --border-light: #ddd;
    }
    body { background: #fff; color: #111; }
    .topbar { position: relative; backdrop-filter: none; -webkit-backdrop-filter: none; background: #fff; }
    .logo-img { filter: invert(1); }
    .day-col { min-height: auto; }
    .ev-card { break-inside: avoid; box-shadow: none; }
    .kb-hint { display: none; }
}
</style>
</head>
<body>

<nav class="topbar" aria-label="Event filters">
    <div class="topbar-left">
        <img src="pubkey-logo.svg" alt="PubKey" class="logo-img">
    </div>
    <div class="topbar-right">
        <select id="statusFilter" aria-label="Filter by status">
            <option value="all">All Statuses</option>
            <option value="definite">Definite</option>
            <option value="tentative">Tentative</option>
            <option value="prospect">Prospect</option>
        </select>
        <select id="locationFilter" aria-label="Filter by location">
            <option value="all">Both Locations</option>
            <option value="nyc">NYC Only</option>
            <option value="dc">DC Only</option>
        </select>
        <select id="roomFilter" aria-label="Filter by room">
            <option value="all">All Rooms</option>
        </select>
        <span class="refresh-indicator" id="lastRefresh"></span>
    </div>
</nav>

<main class="main">
    <h1 class="sr-only">PubKey Events Dashboard</h1>
    <div class="error-banner" id="errorBanner"></div>

    <div class="stats-row">
        <div class="stat-card accent-orange">
            <div class="label">This Week</div>
            <div class="value" id="statTotal">&mdash;</div>
            <div class="sub" id="statSub">events</div>
        </div>
        <div class="stat-card accent-blue">
            <div class="label">NYC</div>
            <div class="value" id="statNYC">&mdash;</div>
            <div class="sub">events</div>
        </div>
        <div class="stat-card accent-red">
            <div class="label">DC</div>
            <div class="value" id="statDC">&mdash;</div>
            <div class="sub">events</div>
        </div>
    </div>

    <div class="week-nav">
        <button class="nav-btn" onclick="changeWeek(-1)" aria-label="Previous week">&#8249;</button>
        <button class="nav-btn" onclick="changeWeek(1)" aria-label="Next week">&#8250;</button>
        <span class="week-label" id="weekLabel"></span>
        <button class="today-btn" onclick="changeWeek(0)">Today</button>
    </div>

    <div id="calendarContainer">
        <div class="loading"><div class="spinner"></div><br>Loading events...</div>
    </div>

    <div class="section-header">
        <h2 class="section-title">Upcoming</h2>
        <span class="section-count" id="upcomingCount"></span>
    </div>
    <div class="table-wrap">
        <table>
            <colgroup>
                <col class="col-date"><col class="col-time"><col class="col-event">
                <col class="col-status"><col class="col-loc"><col class="col-room">
                <col class="col-contact">
            </colgroup>
            <thead>
                <tr>
                    <th>Date</th><th>Time</th><th>Event</th>
                    <th>Status</th><th>Location</th><th>Room</th><th>Contact</th>
                </tr>
            </thead>
            <tbody id="upcomingBody"></tbody>
        </table>
    </div>

    <div class="section-header">
        <h2 class="section-title">Rooms This Week</h2>
    </div>
    <div class="rooms-grid" id="roomsGrid"></div>
</main>

<div class="kb-hint">
    <kbd>&larr;</kbd><kbd>&rarr;</kbd> navigate weeks
</div>

<script>
let allItems = [];
let weekOffset = 0;
let activeStatusFilter = "all";
let activeLocationFilter = "all";
let activeRoomFilter = "all";

/* ---- API helpers ---- */
function apiItemToLocal(item) {
    var loc = item.location || '';
    var locKey = item.locKey || (loc.toLowerCase().indexOf('dc') !== -1 ? 'dc' : 'nyc');
    return {
        name: item.name || '',
        status: (item.status || '').toLowerCase(),
        start: item.start || '',
        end: item.end || null,
        location: loc,
        locKey: locKey,
        room: item.room || '',
        guest_count: item.guest_count || 0,
        contact: item.contact || '',
        eventStyle: item.event_style || '',
        type: item.type || ''
    };
}

/* ---- Load Events from API ---- */
function loadEvents() {
    fetch("/api/events")
        .then(function(res) {
            if (!res.ok) throw new Error("API returned " + res.status);
            return res.json();
        })
        .then(function(data) {
            allItems = (data.items || []).map(apiItemToLocal);
            allItems.sort(function(a, b) { return a.start.localeCompare(b.start); });
            document.getElementById("statSub").textContent = data.source === "tripleseat" ? "live from Tripleseat" : "across all locations";
            populateRoomFilter();
            renderWeek();
        })
        .catch(function(err) {
            document.getElementById("errorBanner").textContent = "Failed to load events: " + err.message;
            document.getElementById("errorBanner").style.display = "block";
            document.getElementById("calendarContainer").innerHTML =
                '<div class="loading" style="color:var(--red)">Could not reach /api/events</div>';
        });
}

/* ---- Helpers ---- */
function getWeekRange(offset) {
    var now = new Date();
    var day = now.getDay();
    var monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
    monday.setHours(0, 0, 0, 0);
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23, 59, 59, 999);
    return { start: monday, end: sunday };
}

function fmt(d) { return d.toISOString().slice(0, 10); }

var _timeFmt = new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
var _dateFmt = new Intl.DateTimeFormat("en-US", { weekday: "short", month: "short", day: "numeric" });

function fmtTime(iso) {
    if (!iso) return "";
    return _timeFmt.format(new Date(iso)).toLowerCase();
}

function fmtDate(iso) {
    if (!iso) return "";
    return _dateFmt.format(new Date(iso));
}

var _escEl = document.createElement("div");
function esc(s) {
    _escEl.textContent = s;
    return _escEl.innerHTML;
}

function getFiltered() {
    return allItems.filter(function(item) {
        if (activeStatusFilter !== "all" && item.status !== activeStatusFilter) return false;
        if (activeLocationFilter !== "all" && item.locKey !== activeLocationFilter) return false;
        if (activeRoomFilter !== "all" && item.room !== activeRoomFilter) return false;
        return true;
    });
}

function getWeekItems(items, range) {
    return items.filter(function(item) {
        var d = new Date(item.start);
        return d >= range.start && d <= range.end;
    });
}

function populateRoomFilter() {
    var rooms = [];
    var seen = {};
    allItems.forEach(function(i) {
        if (i.room && !seen[i.room]) { rooms.push(i.room); seen[i.room] = true; }
    });
    rooms.sort();
    var sel = document.getElementById("roomFilter");
    var current = sel.value;
    sel.innerHTML = '<option value="all">All Rooms</option>';
    rooms.forEach(function(r) {
        var opt = document.createElement("option");
        opt.value = r; opt.textContent = r;
        sel.appendChild(opt);
    });
    sel.value = rooms.indexOf(current) !== -1 ? current : "all";
    activeRoomFilter = sel.value;
}

/* ---- Render ---- */
function renderWeek() {
    var range = getWeekRange(weekOffset);
    var opts = { month: "long", day: "numeric" };
    var endOpts = { month: "long", day: "numeric", year: "numeric" };
    document.getElementById("weekLabel").textContent =
        range.start.toLocaleDateString("en-US", opts) + " \u2013 " + range.end.toLocaleDateString("en-US", endOpts);

    var now = new Date();
    document.getElementById("lastRefresh").textContent =
        now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

    render();
}

function render() {
    var range = getWeekRange(weekOffset);
    var items = getFiltered();
    var weekItems = getWeekItems(items, range);
    document.getElementById("statTotal").textContent = weekItems.length;
    var nycCount = 0, dcCount = 0;
    weekItems.forEach(function(item) {
        if (item.locKey === 'nyc') nycCount++;
        else if (item.locKey === 'dc') dcCount++;
    });
    document.getElementById("statNYC").textContent = nycCount;
    document.getElementById("statDC").textContent = dcCount;
    renderCalendar(weekItems, range);
    renderUpcoming(items);
    renderRooms(weekItems);
}

var _dayDateFmt = new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric" });

function renderCalendar(items, range) {
    var today = fmt(new Date());
    var grouped = {};
    for (var i = 0; i < 7; i++) {
        var d = new Date(range.start);
        d.setDate(range.start.getDate() + i);
        grouped[fmt(d)] = [];
    }
    items.forEach(function(item) {
        var key = item.start.slice(0, 10);
        if (grouped[key]) grouped[key].push(item);
    });

    // Check if entire week is empty
    if (items.length === 0) {
        document.getElementById("calendarContainer").innerHTML =
            '<div class="calendar">' +
            '<div class="empty-week">' +
            '<img src="Untitled-1.png" alt="" loading="lazy">' +
            '<div class="empty-text">No events this week</div>' +
            '<div class="empty-sub">Try a different week or adjust your filters</div>' +
            '</div></div>';
        return;
    }

    var parts = ['<div class="calendar">'];
    var dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

    for (var i = 0; i < 7; i++) {
        var d = new Date(range.start);
        d.setDate(range.start.getDate() + i);
        var key = fmt(d);
        var isToday = key === today;
        var dayItems = (grouped[key] || []).sort(function(a, b) { return a.start.localeCompare(b.start); });

        var count = dayItems.length;
        parts.push('<div class="day-col', isToday ? ' today' : '', '">',
            '<div class="day-head">',
            '<div class="day-head-left">',
            '<div class="dname">', dayNames[i], '</div>',
            '<div class="ddate">', _dayDateFmt.format(d), '</div>',
            '</div>',
            count > 0 ? '<span class="day-count">' + count + '</span>' : '',
            '</div><div class="day-body">');

        if (dayItems.length === 0) {
            parts.push('<div class="empty">\u2014</div>');
        } else {
            for (var j = 0; j < dayItems.length; j++) {
                var item = dayItems[j];
                var isDC = item.locKey === 'dc';
                var sc = item.status.replace(/\s+/g, "-");
                var ts = fmtTime(item.start);
                var te = fmtTime(item.end);

                parts.push('<div class="ev-card', isDC ? ' dc' : '', '">',
                    '<div class="ev-badges">',
                    '<span class="loc-tag ', item.locKey, '">', isDC ? 'DC' : 'NYC', '</span>');
                if (item.status) parts.push('<span class="status-tag ', sc, '">', esc(item.status), '</span>');
                parts.push('</div>',
                    '<div class="ev-name">', esc(item.name), '</div>',
                    '<div class="ev-time">', te ? ts + " \u2013 " + te : ts, '</div>');
                if (item.room) parts.push('<div class="ev-meta">', esc(item.room), '</div>');
                parts.push('</div>');
            }
        }
        parts.push('</div></div>');
    }
    parts.push('</div>');
    document.getElementById("calendarContainer").innerHTML = parts.join('');
}

function renderUpcoming(items) {
    var now = new Date();
    now.setHours(0, 0, 0, 0);
    var upcoming = items
        .filter(function(i) { return new Date(i.start) >= now; })
        .sort(function(a, b) { return a.start.localeCompare(b.start); })
        .slice(0, 25);

    var tbody = document.getElementById("upcomingBody");
    var countEl = document.getElementById("upcomingCount");
    if (countEl) countEl.textContent = upcoming.length ? upcoming.length + ' events' : '';
    if (upcoming.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-table-cell">No upcoming events with current filters</td></tr>';
        return;
    }
    tbody.innerHTML = upcoming.map(function(item) {
        var sc = item.status.replace(/\s+/g, "-");
        return '<tr>' +
            '<td>' + fmtDate(item.start) + '</td>' +
            '<td class="time-cell">' + fmtTime(item.start) + (item.end ? " \u2013 " + fmtTime(item.end) : "") + '</td>' +
            '<td class="name-cell">' + esc(item.name) + '</td>' +
            '<td><span class="status-tag ' + sc + '">' + esc(item.status) + '</span></td>' +
            '<td><span class="loc-tag ' + item.locKey + '">' + (item.locKey === 'dc' ? 'DC' : 'NYC') + '</span></td>' +
            '<td>' + esc(item.room || "\u2014") + '</td>' +
            '<td>' + esc(item.contact || "\u2014") + '</td>' +
            '</tr>';
    }).join("");
}

function renderRooms(items) {
    var rooms = {};
    items.forEach(function(item) {
        if (item.room) rooms[item.room] = (rooms[item.room] || 0) + 1;
    });
    var sorted = Object.entries(rooms).sort(function(a, b) { return b[1] - a[1]; });
    var grid = document.getElementById("roomsGrid");
    if (sorted.length === 0) {
        grid.innerHTML = '<div class="empty-table-cell">No room bookings this week</div>';
        return;
    }
    grid.innerHTML = sorted.map(function(pair) {
        return '<div class="room-card"><span class="room-name">' + esc(pair[0]) +
            '</span><span class="room-count">' + pair[1] + '</span></div>';
    }).join("");
}

function changeWeek(dir) {
    if (dir === 0) weekOffset = 0;
    else weekOffset += dir;
    renderWeek();
}

/* ---- Filter listeners ---- */
document.getElementById("statusFilter").addEventListener("change", function() {
    activeStatusFilter = this.value; render();
});
document.getElementById("locationFilter").addEventListener("change", function() {
    activeLocationFilter = this.value; render();
});
document.getElementById("roomFilter").addEventListener("change", function() {
    activeRoomFilter = this.value; render();
});

/* ---- Keyboard nav ---- */
document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
    if (e.key === "ArrowLeft") { changeWeek(-1); e.preventDefault(); }
    else if (e.key === "ArrowRight") { changeWeek(1); e.preventDefault(); }
    else if (e.key === "t" || e.key === "T") { changeWeek(0); }
});

/* ---- Init ---- */
loadEvents();
</script>
</body>
</html>
