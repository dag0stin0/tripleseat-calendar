<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubKey — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<style>

/* ═══════════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════════ */
:root {
    --bg: #050505;
    --surface: #0a0a0a;
    --surface-raised: #111;
    --surface-hover: #1a1a1a;
    --surface-card: #131316;
    --text: #f0f0f0;
    --text-secondary: #aaa;
    --text-tertiary: #8a8a8a;
    --text-muted: #6b6b6b;
    --border: rgba(255,255,255,.08);
    --border-light: rgba(255,255,255,.06);
    --border-subtle: #151518;

    --blue: #3b82f6;
    --blue-soft: #60a5fa;
    --blue-dim: rgba(59, 130, 246, 0.08);
    --blue-glow: rgba(59, 130, 246, 0.15);

    --red: #ef4444;
    --red-soft: #f87171;
    --red-dim: rgba(239, 68, 68, 0.08);
    --red-glow: rgba(239, 68, 68, 0.15);

    --accent: #ff3d00;
    --accent-soft: #f59e0b;
    --accent-dim: rgba(232, 93, 38, 0.08);
    --accent-glow: rgba(232, 93, 38, 0.15);
    --accent-warm: #FF6B35;

    --orange: #E85D26;
    --orange-dim: rgba(232, 93, 38, 0.08);
    --orange-glow: rgba(232, 93, 38, 0.12);

    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.10);
    --yellow: #eab308;
    --yellow-dim: rgba(234, 179, 8, 0.08);
    --purple: #a855f7;
    --purple-dim: rgba(168, 85, 247, 0.08);

    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out: cubic-bezier(0, 0, 0.2, 1);
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Instrument Sans', system-ui, sans-serif;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
}

/* Film grain overlay */
body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
}

::selection { background: rgba(255,61,0,.25); color: var(--text); }
:focus-visible { outline: 2px solid rgba(255,61,0,.5); outline-offset: 2px; border-radius: 4px; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

.sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ═══════════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════════ */
.topbar {
    border-bottom: 1px solid var(--border-light);
    padding: 0 clamp(16px, 4vw, 48px);
    height: 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5,5,5,.95);
}

.topbar-left {
    display: flex; align-items: center; gap: 14px;
}
.topbar-title {
    font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1;
    color: var(--text); margin: 0;
}
.topbar-title span {
    color: var(--accent);
}

.topbar-right {
    display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════════
   FILTER PILLS — horizontal scroll on mobile
   ═══════════════════════════════════════════ */
.filter-strip {
    display: flex; align-items: center; gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 2px 0;
}
.filter-strip::-webkit-scrollbar { display: none; }

.filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 8px 14px; border-radius: 20px;
    border: 1px solid var(--border-light);
    background: transparent; color: var(--text-tertiary);
    cursor: pointer; white-space: nowrap;
    min-height: 36px;
    transition: all 0.15s var(--ease), box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
}
select.filter-btn {
    padding-right: 26px;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%238a8a8a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
}
.filter-btn:hover {
    color: var(--text-secondary);
    background: var(--surface-raised);
    border-color: var(--border);
}
.filter-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
.filter-btn.active {
    color: var(--text);
    border-color: var(--orange);
    background: var(--orange-dim);
}
.filter-btn.flash {
    box-shadow: 0 0 0 2px var(--orange-glow);
}

.refresh-ts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-muted);
    letter-spacing: 0.3px;
    margin-left: 6px;
}

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
.page {
    max-width: 1440px; margin: 0 auto;
    padding: 0 clamp(16px, 4vw, 48px);
}

/* ═══════════════════════════════════════════
   STATS BAR — cinematic numbers
   ═══════════════════════════════════════════ */
.stats-bar {
    display: flex; align-items: baseline; gap: 40px;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 28px;
    position: relative;
}

.stat {
    display: flex; align-items: baseline; gap: 8px;
    position: relative;
}
.stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px; font-weight: 700;
    letter-spacing: -2px; line-height: 1;
    color: var(--text);
    transition: opacity 0.2s, transform 0.3s var(--ease);
}
.stat-value.updating {
    opacity: 0.3;
    transform: translateY(-2px);
}
.stat-value.nyc {
    color: var(--blue-soft);
    text-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
}
.stat-value.dc {
    color: var(--red-soft);
    text-shadow: 0 0 30px rgba(239, 68, 68, 0.15);
}

.stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 1px;
    text-transform: uppercase;
}

.stats-divider {
    width: 1px; height: 24px;
    background: var(--border); flex-shrink: 0;
    opacity: 0.5;
}

/* ═══════════════════════════════════════════
   WEEK NAV
   ═══════════════════════════════════════════ */
.week-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px;
}

.week-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: var(--radius); color: var(--text-tertiary);
    cursor: pointer; font-size: 18px; font-family: system-ui;
    transition: all 0.1s var(--ease), transform 0.08s;
}
.week-btn:hover {
    border-color: var(--border); color: var(--text-secondary);
    background: var(--surface-raised);
}
.week-btn:active { transform: scale(0.9); transition-duration: 0.04s; }
.week-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 1px; }

.week-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    padding: 0 12px;
    letter-spacing: -0.2px;
    transition: opacity 0.15s, transform 0.2s var(--ease);
}
.week-label.slide-left  { opacity: 0; transform: translateX(-8px); }
.week-label.slide-right { opacity: 0; transform: translateX(8px); }

.today-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--orange); background: var(--orange-dim);
    border: 1px solid rgba(232, 93, 38, 0.15);
    border-radius: 20px;
    padding: 8px 16px; cursor: pointer;
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-left: 8px;
    min-height: 44px;
    transition: all 0.15s var(--ease), box-shadow 0.2s;
}
.today-btn:hover {
    background: rgba(232, 93, 38, 0.15);
    box-shadow: 0 0 16px var(--orange-glow);
}
.today-btn:active { transform: scale(0.95); transition-duration: 0.04s; }
.today-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 1px; }

/* ═══════════════════════════════════════════
   VIEW TOGGLE
   ═══════════════════════════════════════════ */
.view-toggle {
    display: flex; gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 3px;
    margin-left: auto;
}
.view-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 6px 14px; border-radius: 16px;
    border: none; background: transparent;
    color: var(--text-tertiary); cursor: pointer;
    transition: all 0.15s var(--ease);
    min-height: 44px;
}
.view-btn:hover { color: var(--text-secondary); }
.view-btn.active {
    background: var(--orange-dim);
    color: var(--orange);
    border: 1px solid rgba(232, 93, 38, 0.15);
}
.view-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 1px; }

/* ═══════════════════════════════════════════
   MONTH GRID
   ═══════════════════════════════════════════ */
.month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin-bottom: 48px;
}
.month-grid .mg-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-tertiary);
    text-align: center;
    padding: 10px 4px;
    background: var(--surface-raised);
    border-bottom: 1px solid var(--border-light);
}
.month-grid .mg-cell {
    min-height: 100px;
    padding: 6px;
    border-right: 1px solid var(--border-light);
    border-bottom: 1px solid var(--border-light);
    background: var(--surface);
    display: flex; flex-direction: column;
    overflow: hidden;
}
.month-grid .mg-cell:hover {
    background: var(--surface-hover);
    transition: background 0.15s;
}
.month-grid .mg-cell:nth-child(7n) { border-right: none; }
.month-grid .mg-cell.outside {
    background: var(--bg);
    opacity: 0.4;
}
.month-grid .mg-cell.today-cell {
    background: linear-gradient(180deg, rgba(232, 93, 38, 0.06) 0%, var(--surface) 80px);
}
.mg-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    margin-bottom: 4px;
    line-height: 1;
}
.mg-cell.today-cell .mg-date { color: var(--orange); font-weight: 600; }
.mg-events { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; flex: 1; }
.mg-events::-webkit-scrollbar { width: 0; }
.mg-ev {
    font-size: 11px; font-weight: 500;
    padding: 2px 5px;
    border-radius: 3px;
    border-left: 2px solid var(--blue);
    background: var(--blue-dim);
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.4;
    cursor: default;
}
.mg-ev.dc { border-left-color: var(--red); background: var(--red-dim); }

/* ═══════════════════════════════════════════
   DAY VIEW
   ═══════════════════════════════════════════ */
.day-view {
    margin-bottom: 48px;
}
.dv-header {
    font-family: 'Instrument Sans', system-ui, sans-serif;
    font-size: 20px; font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.5px;
}
.dv-event {
    display: flex; gap: 16px;
    padding: 16px;
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius-lg);
    background: var(--surface);
    margin-bottom: 8px;
    transition: background 0.12s, transform 0.15s var(--ease-out-quint);
}
.dv-event:hover {
    background: var(--surface-raised);
    transform: translateY(-1px);
}
.dv-event.dc { border-left-color: var(--red); }
.dv-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    min-width: 110px;
    flex-shrink: 0;
    padding-top: 2px;
}
.dv-info { flex: 1; min-width: 0; }
.dv-name {
    font-size: 14px; font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
}
.dv-meta {
    display: flex; gap: 12px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-tertiary);
}
.dv-meta span { display: flex; align-items: center; gap: 4px; }

/* ═══════════════════════════════════════════
   CALENDAR GRID — DESKTOP (7-col)
   ═══════════════════════════════════════════ */
.calendar {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    margin-bottom: 48px;
    animation: scaleIn 0.35s var(--ease-out-quint) both;
    position: relative;
}
.calendar .day-col:first-child{border-radius:var(--radius-xl) 0 0 var(--radius-xl)}
.calendar .day-col:last-child{border-radius:0 var(--radius-xl) var(--radius-xl) 0}

.day-col {
    min-height: 220px;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border-light);
    background: linear-gradient(135deg,rgba(255,255,255,.02),rgba(255,255,255,.005));
    min-width: 0;
    overflow: visible;
}
.day-col:last-child { border-right: none; }

/* Today column — warm amber glow */
.day-col.today {
    background: linear-gradient(180deg, rgba(232, 93, 38, 0.06) 0%, var(--surface) 180px);
}
.day-col.today .day-head {
    background: var(--orange);
}
.day-col.today .day-head .dname,
.day-col.today .day-head .dnum { color: #000 !important; }
.day-col.today .day-count { background: rgba(0,0,0,0.15); color: #000; }

.day-head {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-light);
    display: flex; justify-content: space-between;
    align-items: center;
    min-height: 48px;
}
.day-head-info { display: flex; align-items: baseline; gap: 6px; }

.day-head .dname {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-tertiary);
}
.day-head .dnum {
    font-size: 18px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
}

.day-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    padding: 2px 7px; border-radius: 10px;
}

.day-body {
    padding: 6px; flex: 1;
    display: flex; flex-direction: column;
    gap: 4px; overflow: visible;
}
.day-body::-webkit-scrollbar { width: 0; }

.day-body .empty-day {
    color: var(--text-muted);
    font-size: 18px; text-align: center;
    padding: 60px 8px; opacity: 0.3;
    font-weight: 400;
}

/* ═══════════════════════════════════════════
   EVENT CARDS
   ═══════════════════════════════════════════ */
.ev {
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.06);
    border-left: 3px solid var(--blue);
    background: rgba(61,139,253,.06);
    cursor: default;
    position: relative;
    transition: transform 0.15s var(--ease-out-quint), background 0.15s, box-shadow 0.2s;
    animation: enterUp 0.3s var(--ease-out-quint) both;
}
.ev.dc { border-left-color: var(--red); background: var(--red-dim); }

.ev:hover {
    transform: translateY(-2px);
    background: var(--blue-glow);
    box-shadow: 0 4px 16px rgba(59, 130, 246, 0.08);
    z-index: 100;
}
.ev.dc:hover {
    background: var(--red-glow);
    box-shadow: 0 4px 16px rgba(239, 68, 68, 0.08);
}

.ev-top {
    display: flex; align-items: center; gap: 5px;
    margin-bottom: 3px;
}

.ev-name {
    font-size: 12.5px; font-weight: 600;
    line-height: 1.3; letter-spacing: -0.1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
}

.ev-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.2px;
}

.ev-room {
    font-size: 11px; color: var(--text-tertiary);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Hover tooltip for desktop */
.ev-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%);
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    min-width: 220px; max-width: 280px;
    z-index: 200;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    pointer-events: none;
}
.ev-tooltip::after {
    content: '';
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--border);
}
.ev:hover .ev-tooltip { display: block; }

.ev-tooltip .tt-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 6px; line-height: 1.3;
}
.ev-tooltip .tt-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-secondary);
    padding: 2px 0;
}
.ev-tooltip .tt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
}
.ev-tooltip .tt-val { font-weight: 500; }

/* Status dot */
.status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    flex-shrink: 0;
    background: var(--green);
}
.status-dot.tentative { background: var(--yellow); }
.status-dot.prospect { background: var(--purple); }
.status-dot.closed { background: var(--text-tertiary); opacity: 0.4; }

/* ═══════════════════════════════════════════
   EMPTY WEEK
   ═══════════════════════════════════════════ */
.empty-week {
    grid-column: 1 / -1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 20px;
    color: var(--text-tertiary);
    background: var(--surface);
}
.empty-week .empty-icon {
    font-size: 36px; margin-bottom: 16px; opacity: 0.2;
}
.empty-week .empty-text {
    font-size: 14px; font-weight: 500; color: var(--text-secondary);
    margin-bottom: 6px;
}
.empty-week .empty-sub { font-size: 12px; }

/* ═══════════════════════════════════════════
   MOBILE DAY LIST (replaces grid < 768px)
   ═══════════════════════════════════════════ */
.day-list {
    display: none;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
}
.day-list-item {
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border-light);
}
.day-list-item.today-item {
    border-color: rgba(232, 93, 38, 0.3);
    background: linear-gradient(180deg, rgba(232, 93, 38, 0.06) 0%, var(--surface) 100%);
}
.day-list-item.empty-item {
    opacity: 0.5;
}
.day-list-item.empty-item .day-list-body { display: none; }

.day-list-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    min-height: 56px;
}
.today-item .day-list-head {
    background: var(--orange);
}
.today-item .day-list-head .dl-day,
.today-item .day-list-head .dl-date,
.today-item .day-list-head .dl-count { color: #000 !important; }

.day-list-head .dl-left {
    display: flex; align-items: baseline; gap: 8px;
}
.dl-day {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-tertiary);
}
.dl-date {
    font-size: 18px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
}
.dl-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    padding: 3px 8px; border-radius: 10px;
}
.today-item .dl-count { background: rgba(0,0,0,0.15); }

.day-list-body {
    padding: 4px 8px 10px;
    display: flex; flex-direction: column;
    gap: 6px;
}

/* Mobile event cards — bigger, roomier */
.m-ev {
    display: flex; gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    border-left: 3px solid var(--blue);
    background: var(--blue-dim);
    min-height: 52px;
    align-items: flex-start;
}
.m-ev.dc { border-left-color: var(--red); background: var(--red-dim); }

.m-ev-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
    background: var(--green);
}
.m-ev-dot.tentative { background: var(--yellow); }
.m-ev-dot.prospect { background: var(--purple); }
.m-ev-dot.closed { background: var(--text-tertiary); opacity: 0.4; }

.m-ev-content { flex: 1; min-width: 0; }
.m-ev-name {
    font-size: 14px; font-weight: 600;
    color: var(--text); line-height: 1.3;
    margin-bottom: 3px;
}
.m-ev-meta {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
}
.m-ev-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-secondary);
}
.m-ev-room {
    font-size: 11px; color: var(--text-tertiary);
}

/* ═══════════════════════════════════════════
   SECTION HEADERS
   ═══════════════════════════════════════════ */
.section-row {
    display: flex; justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    padding-top: 4px;
}
.section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-secondary);
}
.section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-muted);
}

/* ═══════════════════════════════════════════
   UPCOMING TABLE — desktop
   ═══════════════════════════════════════════ */
.table-wrap {
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin-bottom: 48px;
    background: var(--surface);
    max-height: 420px;
    display: flex;
    flex-direction: column;
}
.table-scroll {
    overflow-y: auto; flex: 1;
    -webkit-overflow-scrolling: touch;
}
.table-scroll::-webkit-scrollbar { width: 4px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.table-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

.table-wrap table {
    width: 100%; border-collapse: collapse;
    font-size: 13px; table-layout: fixed;
}
.table-wrap col.c-date    { width: 13%; }
.table-wrap col.c-time    { width: 15%; }
.table-wrap col.c-event   { width: 25%; }
.table-wrap col.c-status  { width: 10%; }
.table-wrap col.c-loc     { width: 7%;  }
.table-wrap col.c-room    { width: 17%; }
.table-wrap col.c-contact { width: 13%; }

.table-wrap th {
    text-align: left; padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-secondary);
    background: var(--surface-raised);
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; z-index: 2;
}

.table-wrap td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    vertical-align: middle;
}
.table-wrap tr:last-child td { border-bottom: none; }
.table-wrap tbody tr {
    transition: background 0.12s;
    position: relative;
}
.table-wrap tbody tr:hover td { background: var(--surface-hover); }
.table-wrap tbody tr::after {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--orange);
    opacity: 0; transition: opacity 0.15s;
}
.table-wrap tbody tr:hover::after { opacity: 1; }

.table-wrap .name-cell { font-weight: 600; color: var(--text); }
.table-wrap .time-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2px;
}

/* ═══════════════════════════════════════════
   MOBILE UPCOMING CARDS (replaces table < 768px)
   ═══════════════════════════════════════════ */
.upcoming-cards {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 48px;
    max-height: 500px;
    overflow-y: auto;
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-light);
    padding: 8px;
    background: var(--surface);
}
.upcoming-cards::-webkit-scrollbar { width: 0; }

.uc-card {
    padding: 14px 16px;
    background: var(--surface-card);
    border-radius: var(--radius);
    border: 1px solid var(--border-subtle);
    display: flex; flex-direction: column; gap: 8px;
}
.uc-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px;
}
.uc-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    line-height: 1.3; flex: 1; min-width: 0;
}
.uc-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-tertiary);
    white-space: nowrap; flex-shrink: 0;
}
.uc-card-bottom {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
}
.uc-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-secondary);
}

/* Tags */
.tag {
    display: inline-flex; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 3px 8px; border-radius: 10px;
    line-height: 1;
}
.tag.nyc { background: var(--blue-dim); color: var(--blue-soft); }
.tag.dc  { background: var(--red-dim);  color: var(--red-soft); }

.tag.definite  { background: var(--green-dim);  color: var(--green); }
.tag.tentative { background: var(--yellow-dim); color: var(--yellow); }
.tag.prospect  { background: var(--purple-dim); color: var(--purple); }
.tag.closed    { background: var(--surface-raised); color: var(--text-tertiary); opacity: 0.6; }

.empty-row {
    text-align: center; color: var(--text-tertiary);
    padding: 48px 16px; font-size: 12px;
}
.empty-rooms { color: var(--text-tertiary); font-size: 11px; }
.error-msg { color: var(--red-soft); }

/* ═══════════════════════════════════════════
   ROOMS
   ═══════════════════════════════════════════ */
.rooms-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 72px;
}

.room-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    transition: border-color 0.12s, background 0.12s, transform 0.12s var(--ease);
}
.room-chip:hover {
    background: var(--surface-raised);
    border-color: var(--border);
    transform: translateY(-1px);
}
.room-chip .r-name {
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
}
.room-chip .r-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--orange);
    letter-spacing: -0.5px;
}

/* ═══════════════════════════════════════════
   ERROR & LOADING
   ═══════════════════════════════════════════ */
.loading {
    text-align: center; padding: 80px 20px;
    color: var(--text-tertiary); font-size: 12px;
}
.loading .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border-light);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
    background: var(--red-dim); color: var(--red-soft);
    padding: 12px 16px; border-radius: var(--radius);
    margin-bottom: 16px; font-size: 12px; display: none;
}

/* ═══════════════════════════════════════════
   SEARCH
   ═══════════════════════════════════════════ */
.search-wrap {
    position: relative;
    display: flex; align-items: center;
    min-width: 0;
}
.search-input {
    font-family: 'Instrument Sans', system-ui, sans-serif;
    font-size: 12px;
    padding: 8px 14px 8px 32px;
    border-radius: 20px;
    border: 1px solid var(--border-light);
    background: var(--surface);
    color: var(--text);
    width: 180px;
    min-height: 36px;
    transition: all 0.15s var(--ease);
    -webkit-appearance: none; appearance: none;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
    outline: none;
    width: 260px;
    border-color: var(--orange);
    background: var(--surface-raised);
    box-shadow: 0 0 0 2px var(--orange-glow);
}
.search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    width: 13px; height: 13px;
    color: var(--text-muted);
    pointer-events: none;
}
.search-clear {
    position: absolute; right: 8px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    border: none; background: transparent;
    color: var(--text-muted);
    cursor: pointer; font-size: 14px;
    display: none; align-items: center; justify-content: center;
    border-radius: 50%;
}
.search-clear:hover { background: var(--surface-raised); color: var(--text-secondary); }
.search-wrap.has-value .search-clear { display: flex; }

@media (max-width: 768px) {
    .search-wrap { width: 100%; }
    .search-input { width: 100%; font-size: 13px; min-height: 40px; }
    .search-input:focus { width: 100%; }
}

/* ═══════════════════════════════════════════
   AT-A-GLANCE HERO
   ═══════════════════════════════════════════ */
.glance-card {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border-light);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin: 0 0 24px;
    animation: enterUp 0.5s var(--ease-out-quint) both;
    animation-delay: 0.08s;
}
.glance-cell {
    background: var(--surface);
    padding: 16px 18px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 92px;
    position: relative;
    overflow: hidden;
}
.glance-cell::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    opacity: 0; transition: opacity 0.3s;
}
.glance-cell:hover::before { opacity: 0.3; }

.glance-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-tertiary);
}
.glance-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 700;
    color: var(--text);
    letter-spacing: -1.5px; line-height: 1;
    transition: opacity 0.2s;
}
.glance-value.money { color: var(--orange); }
.glance-value.small { font-size: 18px; letter-spacing: -0.5px; }
.glance-sub {
    font-size: 11px; color: var(--text-tertiary);
    margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

@media (max-width: 960px) {
    .glance-card { grid-template-columns: repeat(2, 1fr); }
    .glance-cell { min-height: 78px; padding: 14px 16px; }
    .glance-value { font-size: 24px; }
    .glance-value.small { font-size: 16px; }
}
@media (max-width: 480px) {
    .glance-value { font-size: 22px; }
    .glance-label { font-size: 9.5px; letter-spacing: 1px; }
}

/* ═══════════════════════════════════════════
   EVENT CLICKABILITY + TODAY PULSE
   ═══════════════════════════════════════════ */
.ev, .m-ev, .dv-event, .mg-ev, .uc-card {
    cursor: pointer;
}
.ev:focus-visible, .m-ev:focus-visible, .dv-event:focus-visible,
.mg-ev:focus-visible, .uc-card:focus-visible {
    outline: 2px solid var(--orange);
    outline-offset: 2px;
}
.m-ev { transition: background 0.12s, transform 0.1s var(--ease); }
.m-ev:hover { background: var(--blue-glow); transform: translateY(-1px); }
.m-ev.dc:hover { background: var(--red-glow); }
.uc-card { transition: background 0.12s, transform 0.1s var(--ease); }
.uc-card:hover { background: var(--surface-raised); transform: translateY(-1px); }
.mg-ev:hover { filter: brightness(1.4); }

/* Strong today indicator on month grid */
.mg-cell.today-cell {
    background: linear-gradient(180deg, rgba(232, 93, 38, 0.10) 0%, var(--surface) 90px);
    box-shadow: inset 0 0 0 1px rgba(232, 93, 38, 0.35);
}
.mg-cell.today-cell .mg-date {
    color: #fff;
    background: var(--orange);
    width: 20px; height: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-weight: 700;
}

/* ═══════════════════════════════════════════
   EVENT DETAIL DRAWER
   ═══════════════════════════════════════════ */
.drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    z-index: 500;
    transition: opacity 0.25s var(--ease);
}
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }

.drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(460px, 92vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 501;
    transform: translateX(100%);
    transition: transform 0.3s var(--ease-out-quint);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: -12px 0 48px rgba(0,0,0,0.5);
}
.drawer.open { transform: translateX(0); }
.drawer-head {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border-light);
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
}
.drawer-title {
    font-size: 18px; font-weight: 600;
    color: var(--text); line-height: 1.25;
    letter-spacing: -0.3px;
    margin: 0;
}
.drawer-close {
    width: 34px; height: 34px;
    border: 1px solid var(--border-light);
    background: var(--surface-raised);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s var(--ease);
}
.drawer-close:hover {
    color: var(--text);
    border-color: var(--border);
    transform: rotate(90deg);
}
.drawer-close:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
.drawer-body {
    padding: 18px 22px 28px;
    overflow-y: auto; flex: 1;
    scrollbar-width: thin;
}
.drawer-body::-webkit-scrollbar { width: 4px; }
.drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.dr-tags {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin: 6px 0 18px;
}
.dr-section {
    padding: 14px 0;
    border-top: 1px solid var(--border-light);
}
.dr-section:first-of-type { border-top: none; padding-top: 4px; }
.dr-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
}
.dr-row {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 16px;
    padding: 6px 0;
    font-size: 13px;
}
.dr-label {
    color: var(--text-tertiary);
    font-size: 12px;
    flex-shrink: 0;
}
.dr-val {
    color: var(--text);
    text-align: right;
    font-weight: 500;
    word-break: break-word;
    min-width: 0;
}
.dr-val.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
}
.dr-val.money { color: var(--orange); font-weight: 600; }
.dr-val.money-dim { color: var(--text-secondary); }
.dr-empty {
    color: var(--text-muted);
    font-size: 12px;
    font-style: italic;
    text-align: center;
    padding: 16px 0;
}
.dr-actions {
    display: flex; gap: 8px;
    padding: 14px 22px;
    border-top: 1px solid var(--border-light);
    background: var(--surface-raised);
    flex-shrink: 0;
}
.dr-btn {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    min-height: 40px;
    transition: all 0.15s var(--ease);
}
.dr-btn:hover {
    background: var(--surface-hover);
    border-color: var(--border);
    color: var(--text);
}
.dr-btn.primary {
    background: var(--orange-dim);
    color: var(--orange);
    border-color: rgba(232, 93, 38, 0.25);
}
.dr-btn.primary:hover {
    background: rgba(232, 93, 38, 0.15);
    box-shadow: 0 0 14px var(--orange-glow);
}
.dr-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

@media (max-width: 600px) {
    .drawer { width: 100vw; }
}

/* ═══════════════════════════════════════════
   KEYBOARD HINT
   ═══════════════════════════════════════════ */
.kb-hint {
    position: fixed; bottom: 16px; right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--text-muted);
    display: flex; gap: 6px; align-items: center;
    opacity: 0; animation: fadeHint 0.4s 2s forwards;
}
.kb-hint kbd {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 9px; font-family: inherit;
}
@keyframes fadeHint { to { opacity: 0.4; } }

/* ═══════════════════════════════════════════
   ENTRANCE CHOREOGRAPHY
   ═══════════════════════════════════════════ */
@keyframes enterUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes enterFade {
    from { opacity: 0; }
    to   { opacity: 1; }
}
@keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
}

.stats-bar {
    animation: enterUp 0.5s var(--ease-out-quint) both;
    animation-delay: 0.05s;
}
.week-bar {
    animation: enterUp 0.5s var(--ease-out-quint) both;
    animation-delay: 0.1s;
}
#calendarContainer {
    animation: enterFade 0.6s var(--ease-out-quint) both;
    animation-delay: 0.15s;
}
.section-row {
    animation: enterUp 0.4s var(--ease-out-quint) both;
    animation-delay: 0.25s;
}
.table-wrap, .upcoming-cards {
    animation: enterFade 0.5s var(--ease-out-quint) both;
    animation-delay: 0.3s;
}
.rooms-row {
    animation: enterFade 0.5s var(--ease-out-quint) both;
    animation-delay: 0.35s;
}

/* Event card stagger by column */
.day-col:nth-child(1) .ev { animation-delay: 0.02s; }
.day-col:nth-child(2) .ev { animation-delay: 0.04s; }
.day-col:nth-child(3) .ev { animation-delay: 0.06s; }
.day-col:nth-child(4) .ev { animation-delay: 0.08s; }
.day-col:nth-child(5) .ev { animation-delay: 0.10s; }
.day-col:nth-child(6) .ev { animation-delay: 0.12s; }
.day-col:nth-child(7) .ev { animation-delay: 0.14s; }
.ev:nth-child(2) { animation-delay: 30ms; }
.ev:nth-child(3) { animation-delay: 60ms; }
.ev:nth-child(4) { animation-delay: 90ms; }
.ev:nth-child(5) { animation-delay: 120ms; }

/* Today column pulse */
@keyframes todayGlow {
    0%, 100% { box-shadow: inset 0 2px 24px rgba(232, 93, 38, 0.03); }
    50%      { box-shadow: inset 0 2px 24px rgba(232, 93, 38, 0.07); }
}
.day-col.today { animation: todayGlow 4s ease-in-out infinite; }

/* Week change transition */
#calendarContainer { transition: opacity 0.15s; }
#calendarContainer.transitioning { opacity: 0.4; }

.loading { transition: opacity 0.2s; }

/* ═══════════════════════════════════════════
   REDUCED MOTION
   ═══════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
    }
    .day-col.today { animation: none; box-shadow: none; }
    #calendarContainer.transitioning { opacity: 1; }
    body::after { display: none; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — LARGE TABLET
   ═══════════════════════════════════════════ */
@media (max-width: 1100px) {
    .day-head .dnum { font-size: 15px; }
    .ev-name { font-size: 10.5px; }
    .ev-time { font-size: 11px; }
    .ev-room { display: none; }
    .ev-tooltip { display: none !important; }
    .stats-bar { gap: 24px; }
    .stat-value { font-size: 28px; }
}

@media (max-width: 960px) {
    .day-col { min-height: 170px; }
    .ev-top .status-dot { display: none; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-scroll table { min-width: 680px; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
    .topbar {
        height: auto; padding: 12px 16px;
        flex-direction: column; gap: 10px;
        align-items: stretch;
    }
    .topbar-left { justify-content: space-between; }
    .topbar-right { width: 100%; }
    .filter-strip { width: 100%; }
    .filter-btn, select.filter-btn {
        font-size: 11px; padding: 10px 16px;
        min-height: 44px; min-width: 44px;
        border-radius: 22px;
    }
    select.filter-btn { padding-right: 30px; }
    .refresh-ts { display: none; }

    .page { padding: 0 16px; }
    .stats-bar { gap: 20px; padding: 20px 0 16px; flex-wrap: wrap; }
    .stat-value { font-size: 28px; }
    .stats-divider { height: 18px; }

    .week-btn { width: 44px; height: 44px; font-size: 20px; border-radius: var(--radius); }
    .today-btn { padding: 10px 18px; font-size: 11px; min-height: 44px; }

    .view-btn { padding: 8px 12px; font-size: 11px; min-height: 44px; }

    /* Switch: hide grid, show day list (week view) */
    .calendar { display: none !important; }
    .day-list { display: flex; }

    /* Month grid mobile */
    .month-grid { grid-template-columns: repeat(7, 1fr); }
    .month-grid .mg-cell { min-height: 72px; padding: 6px; }
    .mg-date { font-size: 12px; }
    .mg-ev { font-size: 11px; padding: 2px 4px; }

    /* Day view mobile */
    .dv-event { flex-direction: column; gap: 6px; padding: 12px; }
    .dv-time { min-width: unset; font-size: 11px; }

    /* Switch: hide table, show cards */
    .table-wrap { display: none !important; }
    .upcoming-cards { display: flex; }

    .rooms-row { margin-bottom: 48px; }
    .kb-hint { display: none; }

    .ev-tooltip { display: none !important; }
}

@media (max-width: 480px) {
    .stats-bar { gap: 16px; }
    .stat-value { font-size: 24px; letter-spacing: -1.5px; }
    .stat-label { font-size: 11px; }
    .stats-divider { display: none; }

    .rooms-row { flex-direction: column; }
    .room-chip { justify-content: space-between; }

    .week-label { font-size: 11px; padding: 0 8px; }
}

/* ═══════════════════════════════════════════
   PRINT
   ═══════════════════════════════════════════ */
@media print {
    :root {
        --bg: #fff; --surface: #fff; --surface-raised: #f5f5f5;
        --text: #111; --text-secondary: #333; --text-tertiary: #666;
        --border: #bbb; --border-light: #ddd;
        --orange: #c44310;
    }
    @page { size: landscape; margin: 0.5in; }
    body { background: #fff; color: #111; font-size: 11px; }
    body::after { display: none; }
    .topbar {
        position: relative; background: #fff; backdrop-filter: none;
        border-bottom: 2px solid #111;
        padding: 0 0 10px; margin-bottom: 16px; height: auto;
    }
    .topbar-title { font-size: 20px; }
    .topbar-right, .view-toggle, .refresh-ts, .search-wrap { display: none !important; }
    .page { padding: 0; max-width: none; }
    .stats-bar { padding: 8px 0; margin-bottom: 12px; gap: 24px; border-bottom: 1px solid #999; }
    .stat-value { font-size: 22px; text-shadow: none !important; color: #111 !important; }
    .glance-card {
        grid-template-columns: repeat(4, 1fr);
        border-color: #999; background: #999; margin-bottom: 16px;
    }
    .glance-cell { padding: 8px 10px; min-height: 0; }
    .glance-value { font-size: 18px; color: #111 !important; }
    .glance-value.money { color: #c44310 !important; }
    .week-bar { margin-bottom: 10px; }
    .week-btn, .today-btn { display: none; }
    .week-label { font-size: 14px; font-weight: 700; color: #111; padding: 0; }

    .day-col { min-height: auto; background: #fff !important; }
    .day-col.today { background: #fff3ea !important; animation: none; }
    .day-col.today .day-head { background: #c44310; }
    .ev, .m-ev, .dv-event, .uc-card, .day-list-item, .mg-cell { break-inside: avoid; }
    .ev { background: #f7f7f7 !important; border: 1px solid #ccc; border-left-width: 3px; }
    .ev.dc { background: #fff0f0 !important; }
    .ev-tooltip, .kb-hint, .drawer, .drawer-backdrop { display: none !important; }
    .rooms-row { margin-bottom: 12px; }
    a[href]::after { content: ""; }
}
</style>
</head>
<body>

<!-- ════════ NAV ════════ -->
<nav class="topbar" aria-label="Event filters">
    <div class="topbar-left">
        <h1 class="topbar-title">PUBKEY <span>EVENTS</span></h1>
    </div>
    <div class="topbar-right">
        <div class="search-wrap" id="searchWrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            <input type="search" id="searchInput" class="search-input" placeholder="Search events, contacts, rooms…" aria-label="Search events" autocomplete="off" spellcheck="false">
            <button type="button" class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
        </div>
        <div class="filter-strip">
            <select class="filter-btn" id="statusFilter" aria-label="Filter by status">
                <option value="all">All Status</option>
                <option value="definite">Definite</option>
                <option value="tentative">Tentative</option>
                <option value="prospect">Prospect</option>
            </select>
            <select class="filter-btn" id="locationFilter" aria-label="Filter by location">
                <option value="all">All Locations</option>
                <option value="nyc">NYC</option>
                <option value="dc">DC</option>
            </select>
            <select class="filter-btn" id="roomFilter" aria-label="Filter by room">
                <option value="all">All Rooms</option>
            </select>
        </div>
        <span class="refresh-ts" id="lastRefresh"></span>
    </div>
</nav>

<!-- ════════ PAGE ════════ -->
<main class="page">
    <div class="error-banner" id="errorBanner"></div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-value" id="statTotal">&mdash;</span>
            <span class="stat-label" id="statSub">This Week</span>
        </div>
        <div class="stats-divider"></div>
        <div class="stat">
            <span class="stat-value nyc" id="statNYC">&mdash;</span>
            <span class="stat-label">NYC</span>
        </div>
        <div class="stats-divider"></div>
        <div class="stat">
            <span class="stat-value dc" id="statDC">&mdash;</span>
            <span class="stat-label">DC</span>
        </div>
    </div>

    <!-- At a glance -->
    <section class="glance-card" id="glanceCard" aria-label="At a glance summary">
        <div class="glance-cell">
            <div class="glance-label" id="glanceLabelEvents">Events</div>
            <div>
                <div class="glance-value" id="glanceEvents">&mdash;</div>
                <div class="glance-sub" id="glanceEventsSub">&nbsp;</div>
            </div>
        </div>
        <div class="glance-cell">
            <div class="glance-label">Top Room</div>
            <div>
                <div class="glance-value small" id="glanceTopRoom">&mdash;</div>
                <div class="glance-sub" id="glanceTopRoomSub">&nbsp;</div>
            </div>
        </div>
    </section>

    <!-- Nav bar -->
    <div class="week-bar">
        <button class="week-btn" onclick="navigate(-1)" aria-label="Previous">&#8249;</button>
        <button class="week-btn" onclick="navigate(1)" aria-label="Next">&#8250;</button>
        <span class="week-label" id="weekLabel"></span>
        <button class="today-btn" onclick="navigate(0)">Today</button>
        <div class="view-toggle">
            <button class="view-btn active" onclick="setView('day')" data-view="day">Day</button>
            <button class="view-btn" onclick="setView('week')" data-view="week">Week</button>
            <button class="view-btn" onclick="setView('month')" data-view="month">Month</button>
        </div><span style="font-size:10px;color:var(--text-muted);margin-left:8px;font-family:'JetBrains Mono',monospace">1/2/3</span>
    </div>

    <!-- Calendar — desktop grid (week view) -->
    <div id="calendarContainer">
        <div class="loading"><div class="spinner"></div><br>Loading events...</div>
    </div>

    <!-- Calendar — mobile day list (week view) -->
    <div class="day-list" id="dayListContainer"></div>

    <!-- Month view -->
    <div id="monthContainer" style="display:none"></div>

    <!-- Day view -->
    <div id="dayViewContainer" style="display:none"></div>

    <!-- Rooms (week view only) -->
    <div class="section-row" id="roomsSection" style="display:none">
        <span class="section-label" id="roomsLabel">Rooms This Week</span>
    </div>
    <div class="rooms-row" id="roomsGrid" style="display:none"></div>
</main>

<!-- ════════ DRAWER ════════ -->
<div class="drawer-backdrop" id="drawerBackdrop" tabindex="-1"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" aria-hidden="true">
    <div class="drawer-head">
        <h2 class="drawer-title" id="drawerTitle">Event</h2>
        <button class="drawer-close" id="drawerClose" aria-label="Close event details">&times;</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="dr-actions">
        <button class="dr-btn" id="drawerIcs" type="button">Add to Calendar</button>
        <button class="dr-btn primary" id="drawerShare" type="button">Copy Link</button>
    </div>
</aside>

<div class="kb-hint" aria-hidden="true">
    <kbd>&larr;</kbd><kbd>&rarr;</kbd> navigate &nbsp; <kbd>T</kbd> today &nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> views &nbsp; <kbd>/</kbd> search &nbsp; <kbd>Esc</kbd> close
</div>

<!-- ════════ SCRIPT ════════ -->
<script>
var allItems = [];
var itemsById = {};
var weekOffset = 0;
var monthOffset = 0;
var dayOffset = 0;
var currentView = "day";
var activeStatusFilter = "all";
var activeLocationFilter = "all";
var activeRoomFilter = "all";
var searchQuery = "";
var dataSource = "csv";

/* ── API ── */
function apiItemToLocal(item, idx) {
    var loc = item.location || '';
    var locKey = item.locKey || (loc.toLowerCase().indexOf('dc') !== -1 ? 'dc' : 'nyc');
    return {
        id: item.id != null ? String(item.id) : ('e' + idx),
        name: item.name || '',
        status: (item.status || '').toLowerCase(),
        start: item.start || '',
        end: item.end || null,
        location: loc,
        locKey: locKey,
        room: item.room || '',
        guest_count: item.guest_count || 0,
        contact: item.contact || '',
        eventStyle: item.event_style || '',
        type: item.type || '',
        fb_min: item.fb_min != null ? Number(item.fb_min) : null,
        grand_total: item.grand_total != null ? Number(item.grand_total) : null,
        deposit: item.deposit != null ? Number(item.deposit) : null,
        amount_due: item.amount_due != null ? Number(item.amount_due) : null,
        actual: item.actual != null ? Number(item.actual) : null
    };
}

function fmtMoney(n) {
    if (n == null || isNaN(n)) return null;
    if (n === 0) return '$0';
    return '$' + Math.round(n).toLocaleString('en-US');
}
function fmtMoneyCompact(n) {
    if (n == null || isNaN(n)) return '—';
    if (n >= 1000) return '$' + (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
    return '$' + Math.round(n);
}
function matchesSearch(item, q) {
    if (!q) return true;
    var hay = (item.name + '|' + item.contact + '|' + item.room + '|' +
               item.location + '|' + item.eventStyle + '|' + item.status).toLowerCase();
    return hay.indexOf(q) !== -1;
}

function loadEvents() {
    fetch("/api/events")
        .then(function(res) {
            if (!res.ok) throw new Error("API returned " + res.status);
            return res.json();
        })
        .then(function(data) {
            allItems = (data.items || []).map(function(it, i) { return apiItemToLocal(it, i); });
            allItems.sort(function(a, b) { return a.start.localeCompare(b.start); });
            itemsById = {};
            allItems.forEach(function(i) { itemsById[i.id] = i; });
            dataSource = data.source || "csv";
            populateRoomFilter();
            applyUrlState();
            renderWeek();
            openDrawerFromUrl();
        })
        .catch(function(err) {
            document.getElementById("errorBanner").textContent = "Failed to load events: " + err.message;
            document.getElementById("errorBanner").style.display = "block";
            document.getElementById("calendarContainer").innerHTML =
                '<div class="loading error-msg">Could not reach /api/events</div>';
        });
}

/* ── Helpers ── */
function getWeekRange(offset) {
    var now = new Date();
    var day = now.getDay();
    var monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
    monday.setHours(0, 0, 0, 0);
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23, 59, 59, 999);
    return { start: monday, end: sunday };
}

function fmt(d) { return d.toISOString().slice(0, 10); }
var _timeFmt = new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
var _dateFmt = new Intl.DateTimeFormat("en-US", { weekday: "short", month: "short", day: "numeric" });
var _dayDateFmt = new Intl.DateTimeFormat("en-US", { day: "numeric" });
var _dayMonFmt = new Intl.DateTimeFormat("en-US", { month: "short" });
var _mobileDateFmt = new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric" });

function fmtTime(iso) {
    if (!iso) return "";
    return _timeFmt.format(new Date(iso)).toLowerCase();
}
function fmtDate(iso) {
    if (!iso) return "";
    return _dateFmt.format(new Date(iso));
}

var _escEl = document.createElement("div");
function esc(s) { _escEl.textContent = s; return _escEl.innerHTML; }

function getFiltered() {
    var q = searchQuery.trim().toLowerCase();
    return allItems.filter(function(item) {
        if (activeStatusFilter !== "all" && item.status !== activeStatusFilter) return false;
        if (activeLocationFilter !== "all" && item.locKey !== activeLocationFilter) return false;
        if (activeRoomFilter !== "all" && item.room !== activeRoomFilter) return false;
        if (q && !matchesSearch(item, q)) return false;
        return true;
    });
}

function getWeekItems(items, range) {
    return items.filter(function(item) {
        var d = new Date(item.start);
        return d >= range.start && d <= range.end;
    });
}

function populateRoomFilter() {
    var rooms = [], seen = {};
    allItems.forEach(function(i) {
        if (i.room && !seen[i.room]) { rooms.push(i.room); seen[i.room] = true; }
    });
    rooms.sort();
    var sel = document.getElementById("roomFilter");
    var current = sel.value;
    sel.innerHTML = '<option value="all">All Rooms</option>';
    rooms.forEach(function(r) {
        var opt = document.createElement("option");
        opt.value = r; opt.textContent = r;
        sel.appendChild(opt);
    });
    sel.value = rooms.indexOf(current) !== -1 ? current : "all";
    activeRoomFilter = sel.value;
}

/* ── Date Range Helpers ── */
function getMonthRange(offset) {
    var now = new Date();
    var first = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    var last = new Date(first.getFullYear(), first.getMonth() + 1, 0, 23, 59, 59, 999);
    return { start: first, end: last };
}

function getDayRange(offset) {
    var now = new Date();
    var day = new Date(now);
    day.setDate(now.getDate() + offset);
    day.setHours(0, 0, 0, 0);
    var dayEnd = new Date(day);
    dayEnd.setHours(23, 59, 59, 999);
    return { start: day, end: dayEnd };
}

/* ── View Switching ── */
function setView(view) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-view') === view);
    });
    // Show rooms only in week view
    var showRooms = view === 'week' ? '' : 'none';
    document.getElementById('roomsSection').style.display = showRooms;
    document.getElementById('roomsGrid').style.display = showRooms;
    renderAll();
}

function navigate(dir) {
    if (dir === 0) {
        weekOffset = 0; monthOffset = 0; dayOffset = 0;
    } else if (currentView === 'week') {
        weekOffset += dir;
    } else if (currentView === 'month') {
        monthOffset += dir;
    } else if (currentView === 'day') {
        dayOffset += dir;
    }
    renderAll();
}

/* ── Render ── */
function renderAll() {
    var items = getFiltered();
    var range, viewItems;

    if (currentView === 'week') {
        range = getWeekRange(weekOffset);
        var opts = { month: "short", day: "numeric" };
        var endOpts = { month: "short", day: "numeric", year: "numeric" };
        document.getElementById("weekLabel").textContent =
            range.start.toLocaleDateString("en-US", opts) + " \u2013 " + range.end.toLocaleDateString("en-US", endOpts);
        viewItems = getWeekItems(items, range);

        document.getElementById("calendarContainer").style.display = "";
        document.getElementById("dayListContainer").style.display = "";
        document.getElementById("monthContainer").style.display = "none";
        document.getElementById("dayViewContainer").style.display = "none";

        renderCalendar(viewItems, range);
        renderDayList(viewItems, range);
    } else if (currentView === 'month') {
        range = getMonthRange(monthOffset);
        document.getElementById("weekLabel").textContent =
            range.start.toLocaleDateString("en-US", { month: "long", year: "numeric" });
        viewItems = getWeekItems(items, range);

        document.getElementById("calendarContainer").style.display = "none";
        document.getElementById("dayListContainer").style.display = "none";
        document.getElementById("monthContainer").style.display = "";
        document.getElementById("dayViewContainer").style.display = "none";

        renderMonth(items, range);
    } else if (currentView === 'day') {
        range = getDayRange(dayOffset);
        var dayLabel = range.start.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
        document.getElementById("weekLabel").textContent = dayLabel;
        viewItems = getWeekItems(items, range);

        document.getElementById("calendarContainer").style.display = "none";
        document.getElementById("dayListContainer").style.display = "none";
        document.getElementById("monthContainer").style.display = "none";
        document.getElementById("dayViewContainer").style.display = "";

        renderDayView(viewItems, range);
    }

    // Stats always reflect current view's range
    var nycCount = 0, dcCount = 0;
    (viewItems || []).forEach(function(item) {
        if (item.locKey === 'nyc') nycCount++; else if (item.locKey === 'dc') dcCount++;
    });
    animateValue(document.getElementById("statTotal"), (viewItems || []).length);
    animateValue(document.getElementById("statNYC"), nycCount);
    animateValue(document.getElementById("statDC"), dcCount);

    document.getElementById("lastRefresh").textContent =
        (dataSource === 'tripleseat' ? 'Live · ' : '') +
        new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    document.getElementById("statSub").textContent =
        currentView === 'day' ? 'Today' : currentView === 'month' ? 'This Month' : 'This Week';

    renderGlance(viewItems || []);
    renderRooms(viewItems || []);
    persistUrlState();
}

/* ── At-a-glance hero ── */
function renderGlance(items) {
    var scope = currentView === 'day' ? 'Today' : currentView === 'month' ? 'This Month' : 'This Week';
    document.getElementById('glanceLabelEvents').textContent = scope;

    var roomCounts = {};
    items.forEach(function(it) {
        if (it.room) {
            var keys = it.room.split(',').map(function(r){return r.trim();}).filter(Boolean);
            keys.forEach(function(r){ roomCounts[r] = (roomCounts[r]||0) + 1; });
        }
    });

    document.getElementById('glanceEvents').textContent = items.length;
    document.getElementById('glanceEventsSub').textContent = ' ';

    var topRoomEntry = Object.keys(roomCounts).map(function(k){return [k, roomCounts[k]];})
        .sort(function(a, b){ return b[1] - a[1]; })[0];
    document.getElementById('glanceTopRoom').textContent = topRoomEntry ? topRoomEntry[0] : '—';
    document.getElementById('glanceTopRoomSub').textContent =
        topRoomEntry ? topRoomEntry[1] + ' booking' + (topRoomEntry[1] === 1 ? '' : 's') : '—';
}

// Keep renderWeek for backwards compat with init
function renderWeek() { renderAll(); }
function render() { renderAll(); }

function buildTooltipHTML(item) {
    var ts = fmtTime(item.start);
    var te = fmtTime(item.end);
    var timeStr = te ? ts + ' – ' + te : ts;
    var parts = [
        '<div class="ev-tooltip">',
        '<div class="tt-name">' + esc(item.name) + '</div>'
    ];
    if (timeStr) {
        parts.push('<div class="tt-row"><span class="tt-label">Time</span><span class="tt-val">' + timeStr + '</span></div>');
    }
    if (item.room) {
        parts.push('<div class="tt-row"><span class="tt-label">Room</span><span class="tt-val">' + esc(item.room) + '</span></div>');
    }
    if (item.contact) {
        parts.push('<div class="tt-row"><span class="tt-label">Contact</span><span class="tt-val">' + esc(item.contact) + '</span></div>');
    }
    if (item.guest_count) {
        parts.push('<div class="tt-row"><span class="tt-label">Guests</span><span class="tt-val">' + item.guest_count + '</span></div>');
    }
    parts.push('</div>');
    return parts.join('');
}

function renderCalendar(items, range) {
    var today = fmt(new Date());
    var grouped = {};
    for (var i = 0; i < 7; i++) {
        var d = new Date(range.start);
        d.setDate(range.start.getDate() + i);
        grouped[fmt(d)] = [];
    }
    items.forEach(function(item) {
        var key = item.start.slice(0, 10);
        if (grouped[key]) grouped[key].push(item);
    });

    if (items.length === 0) {
        document.getElementById("calendarContainer").innerHTML =

                    '<div class="ev', isDC ? ' dc' : '', '" data-id="', esc(item.id), '" role="button" tabindex="0" aria-label="', esc(item.name), '">',
                    '<div class="ev-top">',
                    '<span class="ev-name">', esc(item.name), '</span>',
                    '</div>',

/* ── Month Grid ── */
function renderMonth(allFilteredItems, range) {
    var today = fmt(new Date());
    var year = range.start.getFullYear();
    var month = range.start.getMonth();
    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month + 1, 0);

    // Start grid on Monday
    var startDow = firstDay.getDay();
    var gridStart = new Date(firstDay);
    gridStart.setDate(firstDay.getDate() - (startDow === 0 ? 6 : startDow - 1));

    // Group all filtered items by date
    var grouped = {};
    allFilteredItems.forEach(function(item) {
        var key = item.start.slice(0, 10);
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(item);
    });

    var parts = ['<div class="month-grid">'];
    var dayNames = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
    for (var h = 0; h < 7; h++) {
        parts.push('<div class="mg-header">' + dayNames[h] + '</div>');
    }

    // Render 6 weeks of cells
    var cellDate = new Date(gridStart);
    for (var c = 0; c < 42; c++) {
        var key = fmt(cellDate);
        var isOutside = cellDate.getMonth() !== month;
        var isToday = key === today;
        var cls = 'mg-cell' + (isOutside ? ' outside' : '') + (isToday ? ' today-cell' : '');
        var dayEvents = (grouped[key] || []).sort(function(a, b) { return a.start.localeCompare(b.start); });

        parts.push('<div class="' + cls + '" onclick="goToDate(\'' + key + '\')" style="cursor:pointer">');
        parts.push('<div class="mg-date">' + cellDate.getDate() + '</div>');
        if (dayEvents.length > 0) {
            parts.push('<div class="mg-events">');
            var show = Math.min(dayEvents.length, 3);
            for (var j = 0; j < show; j++) {
                var item = dayEvents[j];
                var isDC = item.locKey === 'dc';
                parts.push('<div class="mg-ev' + (isDC ? ' dc' : '') + '" data-id="' + esc(item.id) + '" onclick="event.stopPropagation();openDrawer(\'' + esc(item.id) + '\')" role="button" tabindex="0">' + esc(item.name) + '</div>');
            }
            if (dayEvents.length > 3) {
                parts.push('<div style="font-size:10px;color:var(--text-tertiary);padding:2px 4px">+' + (dayEvents.length - 3) + ' more</div>');
            }
            parts.push('</div>');
        }
        parts.push('</div>');
        cellDate.setDate(cellDate.getDate() + 1);
    }
    parts.push('</div>');
    document.getElementById("monthContainer").innerHTML = parts.join('');
}

function goToDate(dateStr) {
    var target = new Date(dateStr + 'T12:00:00');
    var now = new Date();
    now.setHours(12, 0, 0, 0);
    var diff = Math.round((target - now) / (1000 * 60 * 60 * 24));
    dayOffset = diff;
    setView('day');
}

/* ── Drawer ── */
var drawer = document.getElementById('drawer');
var drawerBackdrop = document.getElementById('drawerBackdrop');
var drawerBody = document.getElementById('drawerBody');
var drawerTitle = document.getElementById('drawerTitle');
var drawerClose = document.getElementById('drawerClose');
var drawerIcs = document.getElementById('drawerIcs');
var drawerShare = document.getElementById('drawerShare');
var currentDrawerId = null;
var drawerLastTrigger = null;

function openDrawer(id, triggerEl) {
    var item = itemsById[id];
    if (!item) return;
    currentDrawerId = id;
    drawerLastTrigger = triggerEl || document.activeElement;

    drawerTitle.textContent = item.name || 'Event';
    drawerBody.innerHTML = buildDrawerHTML(item);

    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden', 'false');
    drawerBackdrop.classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(function() { drawerClose.focus(); }, 80);

    try {
        var url = new URL(window.location.href);
        url.searchParams.set('event', id);
        history.replaceState(null, '', url);
    } catch (e) {}
}

function closeDrawer() {
    if (!drawer.classList.contains('open')) return;
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden', 'true');
    drawerBackdrop.classList.remove('open');
    document.body.style.overflow = '';
    currentDrawerId = null;
    try {
        var url = new URL(window.location.href);
        url.searchParams.delete('event');
        history.replaceState(null, '', url);
    } catch (e) {}
    if (drawerLastTrigger && drawerLastTrigger.focus) drawerLastTrigger.focus();
}

function openDrawerFromUrl() {
    try {
        var id = new URL(window.location.href).searchParams.get('event');
        if (id && itemsById[id]) openDrawer(id);
    } catch (e) {}
}

function buildDrawerHTML(item) {
    var locLabel = item.locKey === 'dc' ? 'DC' : 'NYC';
    var parts = [];

    parts.push('<div class="dr-tags">');
    parts.push('<span class="tag ' + item.locKey + '">' + esc(locLabel) + '</span>');
    if (item.eventStyle) parts.push('<span class="tag closed">' + esc(item.eventStyle) + '</span>');
    parts.push('</div>');

    // When & where
    parts.push('<div class="dr-section"><div class="dr-section-title">When &amp; Where</div>');
    var dateStr = item.start ? new Date(item.start).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) : '—';
    parts.push('<div class="dr-row"><span class="dr-label">Date</span><span class="dr-val">' + esc(dateStr) + '</span></div>');
    var timeStr = item.start ? fmtTime(item.start) + (item.end ? ' – ' + fmtTime(item.end) : '') : '—';
    parts.push('<div class="dr-row"><span class="dr-label">Time</span><span class="dr-val mono">' + esc(timeStr) + '</span></div>');
    parts.push('<div class="dr-row"><span class="dr-label">Venue</span><span class="dr-val">' + esc(item.location || '—') + '</span></div>');
    if (item.room) parts.push('<div class="dr-row"><span class="dr-label">Room</span><span class="dr-val">' + esc(item.room) + '</span></div>');
    parts.push('</div>');

    // Contact & guests
    parts.push('<div class="dr-section"><div class="dr-section-title">Booking</div>');
    parts.push('<div class="dr-row"><span class="dr-label">Contact</span><span class="dr-val">' + esc(item.contact || '—') + '</span></div>');
    parts.push('<div class="dr-row"><span class="dr-label">Guests</span><span class="dr-val mono">' + (item.guest_count ? item.guest_count.toLocaleString('en-US') : '—') + '</span></div>');
    if (item.type) parts.push('<div class="dr-row"><span class="dr-label">Type</span><span class="dr-val">' + esc(item.type) + '</span></div>');
    parts.push('</div>');

    // Financials
    var moneyFields = [
        { key: 'fb_min',      label: 'F&B Minimum',  cls: 'money-dim' },
        { key: 'grand_total', label: 'Grand Total',  cls: 'money' },
        { key: 'deposit',     label: 'Deposit Paid', cls: 'money-dim' },
        { key: 'amount_due',  label: 'Balance Due',  cls: 'money-dim' },
        { key: 'actual',      label: 'Actual Revenue', cls: 'money' }
    ];
    var hasMoney = moneyFields.some(function(f) { return item[f.key] != null; });
    parts.push('<div class="dr-section"><div class="dr-section-title">Financials</div>');
    if (hasMoney) {
        moneyFields.forEach(function(f) {
            if (item[f.key] == null) return;
            parts.push(
                '<div class="dr-row"><span class="dr-label">' + f.label +
                '</span><span class="dr-val mono ' + f.cls + '">' + esc(fmtMoney(item[f.key])) + '</span></div>'
            );
        });
    } else {
        parts.push('<div class="dr-empty">No financials recorded yet</div>');
    }
    parts.push('</div>');

    return parts.join('');
}

function buildIcs(item) {
    function pad(n) { return (n < 10 ? '0' : '') + n; }
    function toIcs(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return d.getUTCFullYear() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate()) +
            'T' + pad(d.getUTCHours()) + pad(d.getUTCMinutes()) + pad(d.getUTCSeconds()) + 'Z';
    }
    var dtstart = toIcs(item.start);
    var dtend = toIcs(item.end || item.start);
    var desc = [];
    if (item.contact) desc.push('Contact: ' + item.contact);
    if (item.guest_count) desc.push('Guests: ' + item.guest_count);
    if (item.status) desc.push('Status: ' + item.status);
    var lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//PubKey Events//Calendar//EN',
        'BEGIN:VEVENT',
        'UID:pubkey-' + item.id + '@calendar.pubkey.com',
        'DTSTAMP:' + toIcs(new Date().toISOString()),
        'DTSTART:' + dtstart,
        'DTEND:' + dtend,
        'SUMMARY:' + (item.name || 'Event').replace(/[,;]/g, ' '),
        'LOCATION:' + [item.location, item.room].filter(Boolean).join(' — ').replace(/[,;]/g, ' '),
        'DESCRIPTION:' + desc.join(' | ').replace(/[,;]/g, ' '),
        'END:VEVENT',
        'END:VCALENDAR'
    ];
    return lines.join('\r\n');
}

drawerIcs.addEventListener('click', function() {

});

/* ── URL State ── */
function persistUrlState() {
    try {
        var url = new URL(window.location.href);
        if (currentView !== 'day') url.searchParams.set('v', currentView); else url.searchParams.delete('v');
        var off = currentView === 'week' ? weekOffset : currentView === 'month' ? monthOffset : dayOffset;
        if (off) url.searchParams.set('o', String(off)); else url.searchParams.delete('o');
        if (searchQuery) url.searchParams.set('q', searchQuery); else url.searchParams.delete('q');
        if (activeLocationFilter !== 'all') url.searchParams.set('loc', activeLocationFilter); else url.searchParams.delete('loc');
        if (activeStatusFilter !== 'all') url.searchParams.set('s', activeStatusFilter); else url.searchParams.delete('s');
        history.replaceState(null, '', url);
    } catch (e) {}
}

function applyUrlState() {
    try {
        var p = new URL(window.location.href).searchParams;
        var v = p.get('v'); if (v === 'week' || v === 'month' || v === 'day') currentView = v;
        var o = parseInt(p.get('o'), 10);
        if (!isNaN(o)) {
            if (currentView === 'week') weekOffset = o;
            else if (currentView === 'month') monthOffset = o;
            else dayOffset = o;
        }
        var q = p.get('q'); if (q) { searchQuery = q; searchInput.value = q; searchWrap.classList.add('has-value'); }
        var loc = p.get('loc');
        if (loc === 'nyc' || loc === 'dc') {
            activeLocationFilter = loc;
            document.getElementById('locationFilter').value = loc;
        }
        var s = p.get('s');
        if (s && s !== 'all') {
            activeStatusFilter = s;
            document.getElementById('statusFilter').value = s;
        }
        document.querySelectorAll('.view-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.getAttribute('data-view') === currentView);
        });
        var showRooms = currentView === 'week' ? '' : 'none';
        document.getElementById('roomsSection').style.display = showRooms;
        document.getElementById('roomsGrid').style.display = showRooms;
    } catch (e) {}
}

/* ── Keyboard ── */
document.addEventListener("keydown", function(e) {
    // Esc always closes drawer
    if (e.key === "Escape") {
        if (drawer.classList.contains('open')) { closeDrawer(); return; }
        if (document.activeElement === searchInput && searchInput.value) {
            searchInput.value = '';
            searchWrap.classList.remove('has-value');
            searchQuery = '';
            render();
            return;
        }
    }

    var inForm = e.target.tagName === "SELECT" || e.target.tagName === "INPUT";

    // "/" focuses search from anywhere (unless already typing)
    if ((e.key === "/" || e.key === "s") && !inForm && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
        return;
    }
    if (inForm) return;
    if (drawer.classList.contains('open')) return;

    if (e.key === "ArrowLeft") { navigate(-1); e.preventDefault(); }
    else if (e.key === "ArrowRight") { navigate(1); e.preventDefault(); }
    else if (e.key === "t" || e.key === "T") { navigate(0); }
    else if (e.key === "1") { setView('day'); }
    else if (e.key === "2") { setView('week'); }
    else if (e.key === "3") { setView('month'); }
});

/* ── Touch swipe for mobile week nav ── */
(function() {
    var startX = 0;
    var startY = 0;
    var tracking = false;
    var threshold = 60;

    document.addEventListener('touchstart', function(e) {
        if (e.target.closest('.filter-strip') || e.target.closest('.table-scroll') || e.target.closest('.upcoming-cards')) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        tracking = true;
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
        if (!tracking) return;
        tracking = false;
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy) * 1.5) {
            navigate(dx > 0 ? -1 : 1);
        }
    }, { passive: true });
})();

/* ── Animations ── */
var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function animateValue(el, target) {
    if (prefersReducedMotion) { el.textContent = target; return; }
    var current = parseInt(el.textContent) || 0;
    if (current === target) return;
    var diff = target - current;
    var steps = Math.min(Math.abs(diff), 12);
    var duration = 300;
    var stepTime = duration / steps;
    var step = 0;

    el.classList.add('updating');
    setTimeout(function() { el.classList.remove('updating'); }, 80);

    function tick() {
        step++;
        var progress = step / steps;
        var eased = 1 - Math.pow(1 - progress, 5);
        el.textContent = Math.round(current + diff * eased);
        if (step < steps) setTimeout(tick, stepTime);
    }
    setTimeout(tick, 100);
}

var _origNavigate = navigate;
navigate = function(dir) {
    if (prefersReducedMotion) { _origNavigate(dir); return; }

    var cal = document.getElementById('calendarContainer');
    var month = document.getElementById('monthContainer');
    var dayV = document.getElementById('dayViewContainer');
    var label = document.getElementById('weekLabel');

    if (dir !== 0) {
        label.classList.add(dir < 0 ? 'slide-left' : 'slide-right');
    }

    cal.classList.add('transitioning');

    setTimeout(function() {
        _origNavigate(dir);
        label.classList.remove('slide-left', 'slide-right');
        requestAnimationFrame(function() {
            cal.classList.remove('transitioning');
        });
    }, 120);
};

// Filter flash feedback
['statusFilter', 'locationFilter', 'roomFilter'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('change', function() {
        if (prefersReducedMotion) return;
        el.classList.add('flash');
        setTimeout(function() { el.classList.remove('flash'); }, 300);
    });
});

/* ── Init ── */
loadEvents();
</script>
