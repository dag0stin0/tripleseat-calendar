<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubKey — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<style>

/* ═══════════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════════ */
:root {
    --bg: #09090b;
    --surface: #111113;
    --surface-raised: #19191c;
    --surface-hover: #1f1f23;
    --text: #ececf0;
    --text-secondary: #a1a1aa;
    --text-tertiary: #63636e;
    --border: #27272a;
    --border-light: #1c1c1f;

    --blue: #3b82f6;
    --blue-soft: #60a5fa;
    --blue-dim: rgba(59, 130, 246, 0.08);
    --blue-glow: rgba(59, 130, 246, 0.15);

    --red: #ef4444;
    --red-soft: #f87171;
    --red-dim: rgba(239, 68, 68, 0.08);
    --red-glow: rgba(239, 68, 68, 0.15);

    --orange: #f59e0b;
    --orange-dim: rgba(245, 158, 11, 0.08);

    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.10);
    --yellow: #eab308;
    --yellow-dim: rgba(234, 179, 8, 0.08);
    --purple: #a855f7;
    --purple-dim: rgba(168, 85, 247, 0.08);

    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out: cubic-bezier(0, 0, 0.2, 1);
    --radius: 8px;
    --radius-lg: 12px;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

::selection { background: rgba(59, 130, 246, 0.3); }

.sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ═══════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════ */
.topbar {
    border-bottom: 1px solid var(--border-light);
    padding: 0 clamp(16px, 4vw, 48px);
    height: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
}

.topbar-left { display: flex; align-items: center; gap: 16px; }
.logo-img { height: 20px; width: auto; opacity: 0.7; transition: opacity 0.2s; }
.logo-img:hover { opacity: 1; }

.topbar-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px;
}

.topbar-right { display: flex; align-items: center; gap: 4px; }

.filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 5px 10px; border-radius: 4px;
    border: 1px solid transparent;
    background: transparent; color: var(--text-tertiary);
    cursor: pointer; transition: all 0.15s var(--ease);
    white-space: nowrap;
    -webkit-appearance: none; appearance: none;
}
select.filter-btn {
    padding-right: 22px;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%2363636e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 7px center;
}
.filter-btn:hover { color: var(--text-secondary); background: var(--surface-raised); }
.filter-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }
.filter-btn.active { color: var(--text); border-color: var(--border); background: var(--surface); }

.refresh-ts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--text-tertiary);
    letter-spacing: 0.3px;
    margin-left: 8px;
    opacity: 0.6;
}

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
.page { max-width: 1440px; margin: 0 auto; padding: 0 clamp(16px, 4vw, 48px); }

/* ═══════════════════════════════════════════
   HERO STATS — inline, editorial, not cards
   ═══════════════════════════════════════════ */
.stats-bar {
    display: flex; align-items: baseline; gap: 32px;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 24px;
}

.stat {
    display: flex; align-items: baseline; gap: 8px;
}
.stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 600;
    letter-spacing: -1.5px; line-height: 1;
    color: var(--text);
}
.stat-value.nyc { color: var(--blue-soft); }
.stat-value.dc { color: var(--red-soft); }

.stat-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
}

.stats-divider {
    width: 1px; height: 20px;
    background: var(--border); flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   WEEK NAV
   ═══════════════════════════════════════════ */
.week-bar {
    display: flex; align-items: center; gap: 2px;
    margin-bottom: 16px;
}

.week-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border-light);
    border-radius: 6px; color: var(--text-tertiary);
    cursor: pointer; font-size: 16px; font-family: system-ui;
    transition: all 0.12s var(--ease);
}
.week-btn:hover { border-color: var(--border); color: var(--text-secondary); background: var(--surface); }
.week-btn:active { transform: scale(0.94); }
.week-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }

.week-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--text-secondary);
    padding: 0 10px;
    letter-spacing: -0.2px;
}

.today-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    color: var(--orange); background: var(--orange-dim);
    border: none; border-radius: 4px;
    padding: 4px 8px; cursor: pointer;
    letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.12s var(--ease);
    margin-left: 6px;
}
.today-btn:hover { background: rgba(245, 158, 11, 0.15); }
.today-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 1px; }

/* ═══════════════════════════════════════════
   CALENDAR GRID
   ═══════════════════════════════════════════ */
.calendar {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 48px;
}

.day-col {
    min-height: 200px;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border-light);
    background: var(--surface);
    contain: content;
    min-width: 0;
}
.day-col:last-child { border-right: none; }

/* Today column — warm amber glow */
.day-col.today {
    background: linear-gradient(180deg, rgba(245, 158, 11, 0.04) 0%, var(--surface) 120px);
}
.day-col.today .day-head {
    background: var(--orange);
}
.day-col.today .day-head .dname,
.day-col.today .day-head .dnum { color: #000 !important; }
.day-col.today .day-count { background: rgba(0,0,0,0.15); color: #000; }

.day-head {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border-light);
    display: flex; justify-content: space-between;
    align-items: center;
    min-height: 44px;
}

.day-head-info { display: flex; align-items: baseline; gap: 6px; }

.day-head .dname {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-tertiary);
}
.day-head .dnum {
    font-size: 16px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
}

.day-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    padding: 2px 6px; border-radius: 3px;
}

.day-body {
    padding: 4px; flex: 1;
    display: flex; flex-direction: column;
    gap: 3px; overflow-y: auto;
}
.day-body::-webkit-scrollbar { width: 0; }

.day-body .empty-day {
    color: var(--text-tertiary);
    font-size: 18px; text-align: center;
    padding: 60px 8px; opacity: 0.2;
    font-weight: 300;
}

/* ═══════════════════════════════════════════
   EVENT CARDS
   ═══════════════════════════════════════════ */
.ev {
    padding: 6px 8px;
    border-radius: 5px;
    border-left: 2px solid var(--blue);
    background: var(--blue-dim);
    transition: transform 0.12s var(--ease), background 0.12s;
    cursor: default;
}
.ev:hover { transform: translateY(-1px); background: var(--blue-glow); }

.ev.dc { border-left-color: var(--red); background: var(--red-dim); }
.ev.dc:hover { background: var(--red-glow); }

.ev-top {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 2px;
}

.loc-pip {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--blue); flex-shrink: 0;
}
.loc-pip.dc { background: var(--red); }

.ev-name {
    font-size: 11px; font-weight: 600;
    line-height: 1.3; letter-spacing: -0.1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
}

.ev-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.2px;
}

.ev-room {
    font-size: 9px; color: var(--text-tertiary);
    margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Status dot */
.status-dot {
    width: 4px; height: 4px; border-radius: 50%;
    flex-shrink: 0;
    background: var(--green);
}
.status-dot.tentative { background: var(--yellow); }
.status-dot.prospect { background: var(--purple); }
.status-dot.closed { background: var(--text-tertiary); opacity: 0.4; }

/* ═══════════════════════════════════════════
   EMPTY WEEK
   ═══════════════════════════════════════════ */
.empty-week {
    grid-column: 1 / -1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 64px 20px;
    color: var(--text-tertiary);
    background: var(--surface);
}
.empty-week .empty-icon {
    font-size: 32px; margin-bottom: 12px; opacity: 0.3;
}
.empty-week .empty-text {
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
    margin-bottom: 4px;
}
.empty-week .empty-sub { font-size: 11px; }

/* ═══════════════════════════════════════════
   SECTION HEADERS
   ═══════════════════════════════════════════ */
.section-row {
    display: flex; justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    padding-top: 4px;
}
.section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-tertiary);
}
.section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-tertiary);
}

/* ═══════════════════════════════════════════
   UPCOMING TABLE
   ═══════════════════════════════════════════ */
.table-wrap {
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 48px;
    background: var(--surface);
    content-visibility: auto;
    contain-intrinsic-size: auto 500px;
}

.table-wrap table {
    width: 100%; border-collapse: collapse;
    font-size: 12px; table-layout: fixed;
}
.table-wrap col.c-date    { width: 13%; }
.table-wrap col.c-time    { width: 15%; }
.table-wrap col.c-event   { width: 25%; }
.table-wrap col.c-status  { width: 10%; }
.table-wrap col.c-loc     { width: 7%;  }
.table-wrap col.c-room    { width: 17%; }
.table-wrap col.c-contact { width: 13%; }

.table-wrap th {
    text-align: left; padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-tertiary);
    background: var(--surface-raised);
    border-bottom: 1px solid var(--border-light);
}

.table-wrap td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-secondary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    vertical-align: middle;
}
.table-wrap tr:last-child td { border-bottom: none; }
.table-wrap tbody tr { transition: background 0.08s; }
.table-wrap tbody tr:hover td { background: var(--surface-hover); }

.table-wrap .name-cell { font-weight: 600; color: var(--text); }
.table-wrap .time-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2px;
}

/* Table tags */
.tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.4px;
    padding: 2px 6px; border-radius: 3px;
}
.tag.nyc { background: var(--blue-dim); color: var(--blue-soft); }
.tag.dc  { background: var(--red-dim);  color: var(--red-soft); }

.tag.definite  { background: var(--green-dim);  color: var(--green); }
.tag.tentative { background: var(--yellow-dim); color: var(--yellow); }
.tag.prospect  { background: var(--purple-dim); color: var(--purple); }
.tag.closed    { background: var(--surface-raised); color: var(--text-tertiary); opacity: 0.6; }

.empty-row {
    text-align: center; color: var(--text-tertiary);
    padding: 40px 16px; font-size: 12px;
}

/* ═══════════════════════════════════════════
   ROOMS
   ═══════════════════════════════════════════ */
.rooms-row {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 64px;
}

.room-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    transition: border-color 0.12s, background 0.12s;
}
.room-chip:hover { background: var(--surface-raised); border-color: var(--border); }
.room-chip .r-name {
    font-size: 11px; font-weight: 500;
    color: var(--text-secondary);
}
.room-chip .r-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600;
    color: var(--orange);
    letter-spacing: -0.5px;
}

/* ═══════════════════════════════════════════
   ERROR & LOADING
   ═══════════════════════════════════════════ */
.loading {
    text-align: center; padding: 80px 20px;
    color: var(--text-tertiary); font-size: 12px;
}
.loading .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border-light);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
    background: var(--red-dim); color: var(--red-soft);
    padding: 10px 16px; border-radius: var(--radius);
    margin-bottom: 16px; font-size: 12px; display: none;
}

/* ═══════════════════════════════════════════
   KEYBOARD HINT
   ═══════════════════════════════════════════ */
.kb-hint {
    position: fixed; bottom: 14px; right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--text-tertiary);
    display: flex; gap: 5px; align-items: center;
    opacity: 0; animation: fadeHint 0.4s 2s forwards;
}
.kb-hint kbd {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 9px; font-family: inherit;
}
@keyframes fadeHint { to { opacity: 0.5; } }

/* ═══════════════════════════════════════════
   REDUCED MOTION
   ═══════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
    }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════════════════ */
@media (max-width: 1100px) {
    .day-head .dnum { font-size: 14px; }
    .ev-name { font-size: 10px; }
    .ev-time { font-size: 8px; }
    .ev-room { display: none; }
    .stats-bar { gap: 20px; }
    .stat-value { font-size: 22px; }
}

@media (max-width: 960px) {
    .day-col { min-height: 160px; }
    .ev-top .status-dot { display: none; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap table { min-width: 680px; }
    .topbar-center { display: none; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
    .topbar {
        height: auto; padding: 10px 16px;
        flex-wrap: wrap; gap: 8px;
    }
    .topbar-right { gap: 4px; }
    .filter-btn, select.filter-btn { font-size: 11px; padding: 8px 12px; min-height: 44px; }
    select.filter-btn { padding-right: 28px; }

    .page { padding: 0 16px; }
    .stats-bar { gap: 16px; padding: 20px 0 16px; flex-wrap: wrap; }
    .stat-value { font-size: 22px; }
    .stats-divider { display: none; }

    .week-btn { width: 44px; height: 44px; font-size: 18px; }

    .calendar { grid-template-columns: repeat(2, 1fr); }
    .day-col { min-height: 110px; }
    .day-head { padding: 8px; }
    .day-head .dname { font-size: 8px; }
    .day-head .dnum { font-size: 14px; }
    .ev { padding: 5px 7px; }
    .ev-room { display: none; }
    .ev-top .status-dot { display: none; }

    .rooms-row { margin-bottom: 40px; }
    .kb-hint { display: none; }
}

@media (max-width: 480px) {
    .calendar { grid-template-columns: 1fr; }
    .day-col { min-height: auto; }
    .ev-name { font-size: 12px; }
    .ev-time { font-size: 10px; }
    .ev-room { display: block; }
    .ev-top .status-dot { display: block; }
    .rooms-row { flex-direction: column; }
    .room-chip { justify-content: space-between; }
}

/* ═══════════════════════════════════════════
   PRINT
   ═══════════════════════════════════════════ */
@media print {
    :root {
        --bg: #fff; --surface: #fff; --surface-raised: #f5f5f5;
        --text: #111; --text-secondary: #555; --text-tertiary: #888;
        --border: #ccc; --border-light: #ddd;
    }
    body { background: #fff; color: #111; }
    .topbar { position: relative; background: #fff; }
    .logo-img { filter: invert(1); }
    .day-col { min-height: auto; }
    .day-col.today { background: #fffbeb; }
    .day-col.today .day-head { background: #f59e0b; }
    .ev { break-inside: avoid; }
    .kb-hint { display: none; }
}
</style>
</head>
<body>

<!-- ════════ NAV ════════ -->
<nav class="topbar" aria-label="Event filters">
    <div class="topbar-left">
        <img src="pubkey-logo.svg" alt="PubKey" class="logo-img">
    </div>
    <div class="topbar-right">
        <select class="filter-btn" id="statusFilter" aria-label="Filter by status">
            <option value="all">All Status</option>
            <option value="definite">Definite</option>
            <option value="tentative">Tentative</option>
            <option value="prospect">Prospect</option>
        </select>
        <select class="filter-btn" id="locationFilter" aria-label="Filter by location">
            <option value="all">All Locations</option>
            <option value="nyc">NYC</option>
            <option value="dc">DC</option>
        </select>
        <select class="filter-btn" id="roomFilter" aria-label="Filter by room">
            <option value="all">All Rooms</option>
        </select>
        <span class="refresh-ts" id="lastRefresh"></span>
    </div>
</nav>

<!-- ════════ PAGE ════════ -->
<main class="page">
    <h1 class="sr-only">PubKey Events Dashboard</h1>

    <div class="error-banner" id="errorBanner"></div>

    <!-- Stats — flat, inline, editorial -->
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-value" id="statTotal">&mdash;</span>
            <span class="stat-label" id="statSub">this week</span>
        </div>
        <div class="stats-divider"></div>
        <div class="stat">
            <span class="stat-value nyc" id="statNYC">&mdash;</span>
            <span class="stat-label">NYC</span>
        </div>
        <div class="stats-divider"></div>
        <div class="stat">
            <span class="stat-value dc" id="statDC">&mdash;</span>
            <span class="stat-label">DC</span>
        </div>
    </div>

    <!-- Week nav -->
    <div class="week-bar">
        <button class="week-btn" onclick="changeWeek(-1)" aria-label="Previous week">&#8249;</button>
        <button class="week-btn" onclick="changeWeek(1)" aria-label="Next week">&#8250;</button>
        <span class="week-label" id="weekLabel"></span>
        <button class="today-btn" onclick="changeWeek(0)">Today</button>
    </div>

    <!-- Calendar -->
    <div id="calendarContainer">
        <div class="loading"><div class="spinner"></div><br>Loading events...</div>
    </div>

    <!-- Upcoming -->
    <div class="section-row">
        <span class="section-label">Upcoming</span>
        <span class="section-count" id="upcomingCount"></span>
    </div>
    <div class="table-wrap">
        <table>
            <colgroup>
                <col class="c-date"><col class="c-time"><col class="c-event">
                <col class="c-status"><col class="c-loc"><col class="c-room">
                <col class="c-contact">
            </colgroup>
            <thead>
                <tr>
                    <th>Date</th><th>Time</th><th>Event</th>
                    <th>Status</th><th>Loc</th><th>Room</th><th>Contact</th>
                </tr>
            </thead>
            <tbody id="upcomingBody"></tbody>
        </table>
    </div>

    <!-- Rooms -->
    <div class="section-row">
        <span class="section-label">Rooms this week</span>
    </div>
    <div class="rooms-row" id="roomsGrid"></div>
</main>

<div class="kb-hint">
    <kbd>&larr;</kbd><kbd>&rarr;</kbd> weeks &nbsp; <kbd>T</kbd> today
</div>

<!-- ════════ SCRIPT ════════ -->
<script>
let allItems = [];
let weekOffset = 0;
let activeStatusFilter = "all";
let activeLocationFilter = "all";
let activeRoomFilter = "all";

/* ── API ── */
function apiItemToLocal(item) {
    var loc = item.location || '';
    var locKey = item.locKey || (loc.toLowerCase().indexOf('dc') !== -1 ? 'dc' : 'nyc');
    return {
        name: item.name || '',
        status: (item.status || '').toLowerCase(),
        start: item.start || '',
        end: item.end || null,
        location: loc,
        locKey: locKey,
        room: item.room || '',
        guest_count: item.guest_count || 0,
        contact: item.contact || '',
        eventStyle: item.event_style || '',
        type: item.type || ''
    };
}

function loadEvents() {
    fetch("/api/events")
        .then(function(res) {
            if (!res.ok) throw new Error("API returned " + res.status);
            return res.json();
        })
        .then(function(data) {
            allItems = (data.items || []).map(apiItemToLocal);
            allItems.sort(function(a, b) { return a.start.localeCompare(b.start); });
            document.getElementById("statSub").textContent = data.source === "tripleseat" ? "live" : "this week";
            populateRoomFilter();
            renderWeek();
        })
        .catch(function(err) {
            document.getElementById("errorBanner").textContent = "Failed to load events: " + err.message;
            document.getElementById("errorBanner").style.display = "block";
            document.getElementById("calendarContainer").innerHTML =
                '<div class="loading" style="color:var(--red-soft)">Could not reach /api/events</div>';
        });
}

/* ── Helpers ── */
function getWeekRange(offset) {
    var now = new Date();
    var day = now.getDay();
    var monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
    monday.setHours(0, 0, 0, 0);
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23, 59, 59, 999);
    return { start: monday, end: sunday };
}

function fmt(d) { return d.toISOString().slice(0, 10); }
var _timeFmt = new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
var _dateFmt = new Intl.DateTimeFormat("en-US", { weekday: "short", month: "short", day: "numeric" });

function fmtTime(iso) {
    if (!iso) return "";
    return _timeFmt.format(new Date(iso)).toLowerCase();
}
function fmtDate(iso) {
    if (!iso) return "";
    return _dateFmt.format(new Date(iso));
}

var _escEl = document.createElement("div");
function esc(s) { _escEl.textContent = s; return _escEl.innerHTML; }

function getFiltered() {
    return allItems.filter(function(item) {
        if (activeStatusFilter !== "all" && item.status !== activeStatusFilter) return false;
        if (activeLocationFilter !== "all" && item.locKey !== activeLocationFilter) return false;
        if (activeRoomFilter !== "all" && item.room !== activeRoomFilter) return false;
        return true;
    });
}

function getWeekItems(items, range) {
    return items.filter(function(item) {
        var d = new Date(item.start);
        return d >= range.start && d <= range.end;
    });
}

function populateRoomFilter() {
    var rooms = [], seen = {};
    allItems.forEach(function(i) {
        if (i.room && !seen[i.room]) { rooms.push(i.room); seen[i.room] = true; }
    });
    rooms.sort();
    var sel = document.getElementById("roomFilter");
    var current = sel.value;
    sel.innerHTML = '<option value="all">All Rooms</option>';
    rooms.forEach(function(r) {
        var opt = document.createElement("option");
        opt.value = r; opt.textContent = r;
        sel.appendChild(opt);
    });
    sel.value = rooms.indexOf(current) !== -1 ? current : "all";
    activeRoomFilter = sel.value;
}

/* ── Render ── */
function renderWeek() {
    var range = getWeekRange(weekOffset);
    var opts = { month: "short", day: "numeric" };
    var endOpts = { month: "short", day: "numeric", year: "numeric" };
    document.getElementById("weekLabel").textContent =
        range.start.toLocaleDateString("en-US", opts) + " – " + range.end.toLocaleDateString("en-US", endOpts);
    document.getElementById("lastRefresh").textContent =
        new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    render();
}

function render() {
    var range = getWeekRange(weekOffset);
    var items = getFiltered();
    var weekItems = getWeekItems(items, range);
    document.getElementById("statTotal").textContent = weekItems.length;
    var nycCount = 0, dcCount = 0;
    weekItems.forEach(function(item) {
        if (item.locKey === 'nyc') nycCount++; else if (item.locKey === 'dc') dcCount++;
    });
    document.getElementById("statNYC").textContent = nycCount;
    document.getElementById("statDC").textContent = dcCount;
    renderCalendar(weekItems, range);
    renderUpcoming(items);
    renderRooms(weekItems);
}

var _dayDateFmt = new Intl.DateTimeFormat("en-US", { day: "numeric" });
var _dayMonFmt = new Intl.DateTimeFormat("en-US", { month: "short" });

function renderCalendar(items, range) {
    var today = fmt(new Date());
    var grouped = {};
    for (var i = 0; i < 7; i++) {
        var d = new Date(range.start);
        d.setDate(range.start.getDate() + i);
        grouped[fmt(d)] = [];
    }
    items.forEach(function(item) {
        var key = item.start.slice(0, 10);
        if (grouped[key]) grouped[key].push(item);
    });

    if (items.length === 0) {
        document.getElementById("calendarContainer").innerHTML =
            '<div class="calendar"><div class="empty-week">' +
            '<div class="empty-icon">∅</div>' +
            '<div class="empty-text">No events this week</div>' +
            '<div class="empty-sub">Try a different week or adjust your filters</div>' +
            '</div></div>';
        return;
    }

    var parts = ['<div class="calendar">'];
    var dayNames = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

    for (var i = 0; i < 7; i++) {
        var d = new Date(range.start);
        d.setDate(range.start.getDate() + i);
        var key = fmt(d);
        var isToday = key === today;
        var dayItems = (grouped[key] || []).sort(function(a, b) { return a.start.localeCompare(b.start); });
        var count = dayItems.length;

        parts.push(
            '<div class="day-col', isToday ? ' today' : '', '">',
            '<div class="day-head">',
            '<div class="day-head-info">',
            '<span class="dname">', dayNames[i], '</span>',
            '<span class="dnum">', _dayDateFmt.format(d), '</span>',
            '</div>',
            count > 0 ? '<span class="day-count">' + count + '</span>' : '',
            '</div>',
            '<div class="day-body">'
        );

        if (dayItems.length === 0) {
            parts.push('<div class="empty-day">·</div>');
        } else {
            for (var j = 0; j < dayItems.length; j++) {
                var item = dayItems[j];
                var isDC = item.locKey === 'dc';
                var sc = item.status.replace(/\s+/g, "-");
                var ts = fmtTime(item.start);
                var te = fmtTime(item.end);

                parts.push(
                    '<div class="ev', isDC ? ' dc' : '', '">',
                    '<div class="ev-top">',
                    '<span class="loc-pip', isDC ? ' dc' : '', '"></span>',
                    '<span class="status-dot ', sc, '"></span>',
                    '<span class="ev-name">', esc(item.name), '</span>',
                    '</div>',
                    '<div class="ev-time">', te ? ts + ' – ' + te : ts, '</div>'
                );
                if (item.room) parts.push('<div class="ev-room">', esc(item.room), '</div>');
                parts.push('</div>');
            }
        }
        parts.push('</div></div>');
    }
    parts.push('</div>');
    document.getElementById("calendarContainer").innerHTML = parts.join('');
}

function renderUpcoming(items) {
    var now = new Date(); now.setHours(0, 0, 0, 0);
    var upcoming = items
        .filter(function(i) { return new Date(i.start) >= now; })
        .sort(function(a, b) { return a.start.localeCompare(b.start); })
        .slice(0, 25);

    var tbody = document.getElementById("upcomingBody");
    var countEl = document.getElementById("upcomingCount");
    if (countEl) countEl.textContent = upcoming.length ? upcoming.length : '';

    if (upcoming.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-row">No upcoming events</td></tr>';
        return;
    }
    tbody.innerHTML = upcoming.map(function(item) {
        var sc = item.status.replace(/\s+/g, "-");
        return '<tr>' +
            '<td>' + fmtDate(item.start) + '</td>' +
            '<td class="time-cell">' + fmtTime(item.start) + (item.end ? ' – ' + fmtTime(item.end) : '') + '</td>' +
            '<td class="name-cell">' + esc(item.name) + '</td>' +
            '<td><span class="tag ' + sc + '">' + esc(item.status) + '</span></td>' +
            '<td><span class="tag ' + item.locKey + '">' + (item.locKey === 'dc' ? 'DC' : 'NYC') + '</span></td>' +
            '<td>' + esc(item.room || '—') + '</td>' +
            '<td>' + esc(item.contact || '—') + '</td>' +
            '</tr>';
    }).join('');
}

function renderRooms(items) {
    var rooms = {};
    items.forEach(function(item) {
        if (item.room) rooms[item.room] = (rooms[item.room] || 0) + 1;
    });
    var sorted = Object.entries(rooms).sort(function(a, b) { return b[1] - a[1]; });
    var grid = document.getElementById("roomsGrid");
    if (sorted.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-tertiary);font-size:11px;">No room bookings this week</div>';
        return;
    }
    grid.innerHTML = sorted.map(function(pair) {
        return '<div class="room-chip">' +
            '<span class="r-count">' + pair[1] + '</span>' +
            '<span class="r-name">' + esc(pair[0]) + '</span>' +
            '</div>';
    }).join('');
}

function changeWeek(dir) {
    if (dir === 0) weekOffset = 0; else weekOffset += dir;
    renderWeek();
}

/* ── Filters ── */
document.getElementById("statusFilter").addEventListener("change", function() {
    activeStatusFilter = this.value; render();
});
document.getElementById("locationFilter").addEventListener("change", function() {
    activeLocationFilter = this.value; render();
});
document.getElementById("roomFilter").addEventListener("change", function() {
    activeRoomFilter = this.value; render();
});

/* ── Keyboard ── */
document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
    if (e.key === "ArrowLeft") { changeWeek(-1); e.preventDefault(); }
    else if (e.key === "ArrowRight") { changeWeek(1); e.preventDefault(); }
    else if (e.key === "t" || e.key === "T") { changeWeek(0); }
});

/* ── Init ── */
loadEvents();
</script>
</body>
</html>
